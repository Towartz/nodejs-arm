# .github/workflows/node-android.yml
# Cross-compiles Node.js for Android: arm64-v8a (verified) + armeabi-v7a (experimental,
# see nodejs/node#58975). Produces per ABI: lib<n>.so + node CLI binary.
name: Node.js for Android (ARM)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build'
        type: choice
        default: 'v24.x'
        options:
          - 'v24.x'       # LTS (Krypton)
          - 'v26.x'       # Latest release line
          - 'custom'
      custom_ref:
        description: 'Custom git ref — only used when "custom" is selected'
        required: false
        default: ''
      lib_name:
        description: 'Library name — output will be lib<n>.so (e.g. "aurora" → libaurora.so)'
        required: false
        default: 'node'
      profile:
        description: 'Build profile'
        type: choice
        default: 'balanced'
        options:
          - 'balanced'    # JIT + -O3: best runtime speed (Baileys/server use)
          - 'speed'       # + LTO: faster, much longer build
          - 'size'        # + v8-lite-mode: lower RAM, slower JS/crypto

env:
  NDK_VERSION: 'r27c'
  MIN_API: '24'                # Node v24+ requires API 24+ (Android 7.0). Do NOT set below 24.
  ANDROID_PLATFORM: 'android-24'

jobs:
  build:
    name: android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    # armeabi-v7a is best-effort: upstream V8 cross-build for 32-bit targets on
    # x64 hosts has open bugs (nodejs/node#58975). Never let it block arm64.
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a            # 64-bit ARM — verified working
            dest_cpu: arm64
            target: aarch64-linux-android
          - abi: armeabi-v7a          # 32-bit ARM — experimental
            dest_cpu: arm
            target: armv7a-linux-androideabi
            experimental: true

    steps:
      # ---------- 0. Resolve inputs ----------
      - name: Resolve inputs
        run: |
          REQ="${{ inputs.node_version || 'v24.x' }}"
          if [ "$REQ" = "custom" ]; then REQ="${{ inputs.custom_ref }}"; fi
          test -n "$REQ" || { echo "::error::custom_ref is empty"; exit 1; }
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="${{ inputs.lib_name || 'node' }}"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          if ! [[ "$NAME" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "::error::Invalid lib_name '$NAME'"; exit 1
          fi
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Building Node.js '$REQ' as lib$NAME.so"

      # ---------- 1. Android NDK ----------
      - name: Set up Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Verify NDK toolchain paths
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-$ANDROID_NDK}" >> "$GITHUB_ENV"
          TC="${ANDROID_NDK_HOME:-$ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          test -x "$TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"

      # ---------- 2. Host build tools ----------
      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 g++ make git ca-certificates patchelf

      - name: Install 32-bit multilib (armeabi-v7a only)
        if: matrix.dest_cpu == 'arm'
        run: sudo apt-get install -y gcc-multilib g++-multilib
        # V8 mandates 32-bit host tools when targeting 32-bit arm.

      # ---------- 3. Node.js source ----------
      - name: Clone Node.js (${{ env.NODE_REF }})
        run: git clone --depth 1 --branch "$NODE_REF" https://github.com/nodejs/node.git node

      # ---------- 3b. Patch known Android cross-build issues ----------
      # Android is not an officially tested/supported Node.js target (core team
      # position, see nodejs/node#58505) — these are community-tracked issues
      # carried by Termux's Node.js packaging for years and partially upstreamed.
      # Expect this list to need revisiting on every Node major bump.
      - name: Patch V8 for Android cross-build
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib
          import textwrap

          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping — may be version-specific)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path} (maybe already fixed upstream)")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          # Bionic ships <execinfo.h> but declares backtrace*() only for API 33+.
          # If this file is ever compiled by the NDK clang, provide no-op stubs.
          # Confirmed still live on Node 22+/NDK r27 in nodejs/node#58505 (same
          # three undeclared identifiers: backtrace, backtrace_symbols,
          # backtrace_symbols_fd, in this exact file).
          patch('deps/v8/src/base/debug/stack_trace_posix.cc',
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"',
                '#if defined(__ANDROID__)\n'
                'extern "C" int backtrace(void**, int) { return 0; }\n'
                'extern "C" char** backtrace_symbols(void* const*, int) { return nullptr; }\n'
                'extern "C" void backtrace_symbols_fd(void* const*, int, int) {}\n'
                '#endif\n\n'
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"')

          # static_assert too strict for some clang/libc++ combos
          patch('deps/v8/src/base/small-vector.h',
                '  ASSERT_TRIVIALLY_COPYABLE(T);',
                '  // ASSERT_TRIVIALLY_COPYABLE(T);  // android xbuild: nodejs/node#58975')

          # FIX for: undefined symbol v8_internal_simulator_ProbeMemory /
          # trap_handler::RegisterDefaultTrapHandler / TryHandleSignal at the
          # mksnapshot link step (root cause: deps/v8/src/trap-handler/trap-handler.h
          # decides V8_TRAP_HANDLER_SUPPORTED per V8_HOST_ARCH/V8_TARGET_ARCH/V8_OS
          # combination; the ARM64-target-simulated-on-x64-Linux-host branch says
          # "supported", but Node's gyp port of V8's build never compiles the
          # matching trap-handler/simulator objects for the .host toolset — see
          # nodejs/node#36287, where the original reporter traced this to the exact
          # same host-toolset object selection gap).
          #
          # Node.js ships an official patch for this at android-patches/trap-handler.h.patch
          # in THIS checkout (applied automatically by ./android-configure, which this
          # workflow does not use — it calls ./configure directly). That in-tree patch
          # is a hunk against a moving upstream file, so it goes stale across Node refs
          # (nodejs/node#60369 documents prior staleness) and this workflow has no way to
          # fetch a version pinned to whatever ref the user picks in node_version/custom_ref.
          #
          # Use Termux's nodejs-lts patch instead (github.com/termux/termux-packages,
          # packages/nodejs-lts/deps-v8-src-trap-handler-trap-handler.h.patch, fetched and
          # reviewed on 2026-07-17): it deletes the whole V8_HOST_ARCH/V8_TARGET_ARCH/V8_OS
          # gating table and hardcodes V8_TRAP_HANDLER_SUPPORTED=false, so there's no
          # per-arch branch left to go stale — it can't apply-fail the way an in-tree hunk
          # can, at the cost of losing V8's signal-based OOB-trap fast path for WASM (same
          # tradeoff as the v8_enable_webassembly=false fallback already noted below; this
          # is strictly narrower since only the trap-handler fast path is dropped, not all
          # of WASM). Applied as an in-tree patch to keep this step's failure mode identical
          # to the block above (::warning on missing context) rather than a hard build stop:
          patch('deps/v8/src/trap-handler/trap-handler.h',
                textwrap.dedent('''\
                    // X64 on Linux, Windows, MacOS, FreeBSD.
                    #if V8_HOST_ARCH_X64 && V8_TARGET_ARCH_X64 &&                        \\
                        ((V8_OS_LINUX && !V8_OS_ANDROID) || V8_OS_WIN || V8_OS_DARWIN || \\
                         V8_OS_FREEBSD)
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Arm64 (non-simulator) on Linux, Windows, MacOS.
                    #elif V8_TARGET_ARCH_ARM64 && V8_HOST_ARCH_ARM64 && \\
                        ((V8_OS_LINUX && !V8_OS_ANDROID) || V8_OS_WIN || V8_OS_DARWIN)
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Arm64 simulator on x64 on Linux, Mac, or Windows.
                    //
                    // The simulator case uses some inline assembly code, which cannot be
                    // compiled with MSVC, so don't enable the trap handler in that case.
                    // (MSVC #defines _MSC_VER, but so does Clang when targeting Windows, hence
                    // the check for __clang__.)
                    #elif V8_TARGET_ARCH_ARM64 && V8_HOST_ARCH_X64 && \\
                        (V8_OS_LINUX || V8_OS_DARWIN || V8_OS_WIN) && \\
                        (!defined(_MSC_VER) || defined(__clang__))
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Loong64 (non-simulator) on Linux.
                    #elif V8_TARGET_ARCH_LOONG64 && V8_HOST_ARCH_LOONG64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Loong64 simulator on x64 on Linux
                    #elif V8_TARGET_ARCH_LOONG64 && V8_HOST_ARCH_X64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // RISCV64 (non-simulator) on Linux.
                    #elif V8_TARGET_ARCH_RISCV64 && V8_HOST_ARCH_RISCV64 && V8_OS_LINUX && \\
                        !V8_OS_ANDROID
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // RISCV64 simulator on x64 on Linux
                    #elif V8_TARGET_ARCH_RISCV64 && V8_HOST_ARCH_X64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Everything else is unsupported.
                    #else
                    #define V8_TRAP_HANDLER_SUPPORTED false
                    #endif'''),
                '#define V8_TRAP_HANDLER_SUPPORTED false')

          # FIX for: libuv's main 'libuv' gyp target uses a bare 'include_dirs' key
          # (no '+'), which replaces gyp's default include path list for that target
          # instead of appending to it — this can drop NDK/bionic-relevant search
          # paths that upstream's OS=="linux" defaults would normally supply. Verified
          # against a fresh nodejs/node v24.x clone (2026-07-17): this exact 6-line
          # block (target_name/toolsets/type/include_dirs) is present verbatim and
          # unique in deps/uv/uv.gyp. Source: Termux's nodejs-lts packaging
          # (packages/nodejs-lts/deps-uv-uv.gyp.patch); NOT Termux-runtime-specific
          # (unlike several sibling patches in that same directory that hardcode a
          # Termux install prefix — those are skipped, see the summary at the end of
          # this step). Note: the patch file's own diff context predates libuv's
          # 'toolsets': ['host', 'target'] line that now sits between target_name and
          # type in current Node refs — included below since a strict copy of the old
          # patch's context would silently no-op against this file:
          patch('deps/uv/uv.gyp',
                '\n'.join([
                    "      'target_name': 'libuv',",
                    "      'toolsets': ['host', 'target'],",
                    "      'type': '<(uv_library)',",
                    "      'include_dirs': [",
                    "        'include',",
                    "        'src/',",
                    "      ],",
                ]),
                '\n'.join([
                    "      'target_name': 'libuv',",
                    "      'toolsets': ['host', 'target'],",
                    "      'type': '<(uv_library)',",
                    "      'include_dirs+': [",
                    "        'include',",
                    "        'src/',",
                    "      ],",
                ]))
          # Same issue, second occurrence: the 'include' dir under
          # direct_dependent_settings (consumed by anything that depends on the
          # libuv target) is also a bare 'include_dirs' key. Verified unique in the
          # same v24.x clone:
          patch('deps/uv/uv.gyp',
                "        'include_dirs': [ 'include' ],",
                "        'include_dirs+': [ 'include' ],")
          # NOTE: Termux's deps-uv-uv.gyp.patch has a third hunk adding a
          # ['defines': ['__USE_GNU']] entry to the OS=="android" link_settings
          # block, aimed at a version of this file where that block's source list
          # was an inline ['src/unix/random-sysctl-linux.c', 'src/unix/epoll.c']
          # pair lacking '_GNU_SOURCE'. Checked against the same v24.x clone: that
          # inline list no longer exists (libuv now uses a named
          # '<@(uv_sources_android)' array), and the surrounding OS=="android" block
          # already sets 'defines': ['_GNU_SOURCE'] — which itself implies
          # __USE_GNU in glibc/bionic headers — so the underlying gap this hunk
          # patched has already been closed upstream. Deliberately not carried
          # forward; applying it as string-replacement would just no-op (::warning)
          # against current Node refs, and it wouldn't help older refs either since
          # _GNU_SOURCE already covers the same need.

          # FIX for: uv_fs_copyfile can hang or misbehave at runtime on-device.
          # FICLONE/FICLONE_FORCE are reflink ioctls that the NDK's bionic headers
          # define (so the #ifdef FICLONE guard in deps/uv/src/unix/fs.c compiles
          # cleanly), but the ioctl itself is unimplemented on most Android
          # filesystem drivers (ext4/f2fs configs vary by OEM/kernel). This is a
          # runtime correctness issue, not a build failure, so it won't surface in
          # this CI job — only later, in whatever app embeds lib${LIB_NAME}.so and
          # calls fs.copyFile/cp. Guard it out at compile time so unix/fs.c never
          # attempts the ioctl on Android in the first place. Source: Termux's
          # nodejs-lts packaging (packages/nodejs-lts/avoid-ficlone-ioctl.patch,
          # fetched and reviewed 2026-07-17); this one is a straight #ifndef
          # __ANDROID__ guard, not Termux-prefix-specific, so it applies as-is:
          patch('deps/uv/src/unix/fs.c',
                textwrap.dedent("""\
                    #ifdef FICLONE
                      if (req->flags & UV_FS_COPYFILE_FICLONE ||
                          req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {"""),
                textwrap.dedent("""\
                    #ifndef __ANDROID__
                    #ifdef FICLONE
                      if (req->flags & UV_FS_COPYFILE_FICLONE ||
                          req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {"""))

          # FIX for: use of undeclared identifier 'aligned_alloc' when compiling
          # test/cctest/test_crypto_clienthello.cc with the NDK toolchain (Bionic's
          # aligned_alloc requires _ISOC11_SOURCE or API level >= 29, which is not
          # guaranteed by the MIN_API=24 baseline). Use posix_memalign instead,
          # which is available since API 18 and is the NDK-recommended portable API.
          # Confirmed against Node v24.x (2026-07-17).
          patch('test/cctest/test_crypto_clienthello.cc',
                "    alloc_base = static_cast<uint8_t*>(aligned_alloc(page, 2 * page));",
                "    CHECK_EQ(posix_memalign(reinterpret_cast<void**>(&alloc_base), page, 2 * page), 0);")

          # FIX for: std::atomic_ref is not available in NDK r27c's libc++ for Android
          # targets (no member named 'atomic_ref' in namespace 'std'). V8 in Node.js
          # v26.x uses it in deps/v8/src/base/atomicops.h, memcopy.h, AND
          # deps/v8/include/cppgc/allocation.h — the first two happen to include
          # each other, but the third only includes v8config.h. Rather than patching
          # each file individually as new ones crop up during compilation, add the
          # polyfill to deps/v8/include/v8config.h which EVERY V8 header includes.
          # Keep the memcopy.h direct-__atomic_store_n patch below (it's cleaner
          # for that specific callsite); remove the old atomicops.h polyfill since
          # v8config.h is always included first.
          v8config_h = pathlib.Path('deps/v8/include/v8config.h')
          s = v8config_h.read_text()
          old_atomic_line = '#include <memory>'
          new_polyfill_block = (
              '#include <memory>\n'
              '#if defined(__ANDROID__) && !defined(__cpp_lib_atomic_ref)\n'
              '#ifndef V8_STD_ATOMIC_REF_POLYFILL\n'
              '#define V8_STD_ATOMIC_REF_POLYFILL\n'
              'namespace std {\n'
              'template <typename T>\n'
              'struct atomic_ref {\n'
              '  explicit atomic_ref(T& obj) : ptr_(&obj) {}\n'
              '  void store(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    __atomic_store_n(ptr_, val, static_cast<int>(order)); }\n'
              '  T load(memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_load_n(ptr_, static_cast<int>(order)); }\n'
              '  T exchange(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_exchange_n(ptr_, val, static_cast<int>(order)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order success, memory_order failure) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(success), static_cast<int>(failure)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(order), static_cast<int>(order)); }\n'
              '  T fetch_add(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_add(ptr_, val, static_cast<int>(order)); }\n'
              '  T fetch_or(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_or(ptr_, val, static_cast<int>(order)); }\n'
              'private:\n'
              '  T* ptr_;\n'
              '};\n'
              '}  // namespace std\n'
              '#endif\n'
              '#endif')
          if old_atomic_line in s:
              s = s.replace(old_atomic_line, new_polyfill_block, 1)
              v8config_h.write_text(s)
              print("patched deps/v8/include/v8config.h (std::atomic_ref polyfill)")
          else:
              print("::warning::could not find '#include <memory>' in v8config.h")

          # FIX for: std::atomic_ref used in deps/v8/src/base/memcopy.h (Relaxed_Memset)
          # which does NOT include atomicops.h — its own #include <atomic> won't pick
          # up the polyfill above. Use __atomic_store_n directly on the integral type T
          # (guaranteed by the `requires std::is_integral_v<T>` constraint).
          patch('deps/v8/src/base/memcopy.h',
                '    std::atomic_ref<T>(destination[i]).store(value, std::memory_order_relaxed);',
                '    __atomic_store_n(&destination[i], value, __ATOMIC_RELAXED);')

          # FIX for: undefined symbol android_getCpuFeatures at link time (zlib's
          # cpu_features.c uses the NDK cpufeatures library which is not compiled in
          # the gyp build).  Switch to getauxval(AT_HWCAP) which is available in
          # bionic and is what the existing Linux ARM64 code path already uses.
          # Apply as three coordinated string replacements on the same file.
          zlib_c = pathlib.Path('deps/zlib/cpu_features.c')
          s = zlib_c.read_text()
          # 1. Merge Android include block into Linux include block
          old_incl = (
              '#if defined(ARMV8_OS_ANDROID)\n'
              '#include <cpu-features.h>\n'
              '#elif defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          new_incl = (
              '#if defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          if old_incl in s:
              s = s.replace(old_incl, new_incl, 1)
              print("patched deps/zlib/cpu_features.c (includes)")
          else:
              print("::warning::could not find Android/Linux include block in cpu_features.c")
          # 2. Replace aarch64 Android branch (uses #if, not #elif)
          old_aarch64 = (
              '#if defined(ARMV8_OS_ANDROID) && defined(__aarch64__)\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM64_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM64_FEATURE_PMULL);')
          new_aarch64 = (
              '#if (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && defined(__aarch64__)\n'
              '    unsigned long features = getauxval(AT_HWCAP);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP_PMULL);')
          if old_aarch64 in s:
              s = s.replace(old_aarch64, new_aarch64, 1)
              print("patched deps/zlib/cpu_features.c (aarch64)")
          else:
              print("::warning::could not find Android aarch64 branch in cpu_features.c")
          # 3. Replace aarch32 Android branch (uses #elif)
          old_aarch32 = (
              '#elif defined(ARMV8_OS_ANDROID) /* aarch32 */\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM_FEATURE_PMULL);')
          new_aarch32 = (
              '#elif (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && (defined(__ARM_NEON) || defined(__ARM_NEON__))\n'
              '    unsigned long features = getauxval(AT_HWCAP2);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP2_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP2_PMULL);')
          if old_aarch32 in s:
              s = s.replace(old_aarch32, new_aarch32, 1)
              print("patched deps/zlib/cpu_features.c (aarch32)")
          else:
              print("::warning::could not find Android aarch32 branch in cpu_features.c")
          zlib_c.write_text(s)

          # The FICLONE patch above opened an #ifndef __ANDROID__ block that needs a
          # matching #endif before the existing #endif that closes the #ifdef FICLONE
          # block. Run as a second, explicit pass (not folded into the patch() call
          # above) because the insertion point is identified by different surrounding
          # context than the opening edit, and doing it as one replace() would require
          # matching a very long span between the two edit points for uniqueness.
          fs_c = pathlib.Path('deps/uv/src/unix/fs.c')
          s = fs_c.read_text()
          old_close = '\n'.join([
              '    goto out;',
              '  }',
              '#endif',
              '',
              '  bytes_to_send = src_statsbuf.st_size;',
          ])
          new_close = '\n'.join([
              '    goto out;',
              '  }',
              '#endif',
              '#endif',
              '',
              '  bytes_to_send = src_statsbuf.st_size;',
          ])
          if old_close not in s:
              print("::warning::context not found for FICLONE #endif close in deps/uv/src/unix/fs.c (maybe already fixed upstream, or the #ifdef FICLONE opening patch above didn't apply — check for a mismatched #ifndef/#endif pair before the build step)")
          else:
              fs_c.write_text(s.replace(old_close, new_close, 1))
              print("closed #ifndef __ANDROID__ block in deps/uv/src/unix/fs.c")
          PYEOF

          echo "Skipped from Termux's nodejs-lts patch set (reviewed, not applicable to a non-Termux NDK cross-build):"
          echo "  - common.gypi.patch: removes an OS==\"android\" cflags/ldflags stanza tied to"
          echo "    Termux's own android_ndk_path/cpufeatures usage. This is NOT the fix for the"
          echo "    -m32/-m64 host-cflags collision noted in the cross-compile step below --"
          echo "    reviewed 2026-07-17 and found unrelated to that issue; if that collision is"
          echo "    hit on the armeabi-v7a leg, look elsewhere (see the comment at that step)."
          echo "  - deps-uv-src-unix-core.c.patch, deps-v8-src-flags-flag-definitions.h.patch:"
          echo "    swap /data/local/tmp for a literal @TERMUX_PREFIX@/tmp placeholder. Not"
          echo "    applicable outside Termux's own install layout; /data/local/tmp is correct here."
          echo "  - deps-uvwasi-src-uvwasi.c.patch: re-enables WASI readdir support on Android,"
          echo "    relying on Termux's libc environment for the underlying dirent API. Unverified"
          echo "    against a bare NDK build and not exercised by this project's workloads."
          echo "  - deps-uv-src-unix-process.c.patch: strips post-fork setuid/setgid/setgroups"
          echo "    privilege-drop calls for Termux's unprivileged userland. Not a cross-compile"
          echo "    concern and not applicable here."

      # ---------- 4. Cross-compile ----------
      - name: Cross-compile Node.js for ${{ matrix.abi }}
        working-directory: node
        run: |
          export TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"

          # Target toolchain (API level via wrapper suffix == -DANDROID_PLATFORM=android-24)
          export CC="$TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"
          export CXX="$TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang++"
          export AR="$TC/bin/llvm-ar"
          export NM="$TC/bin/llvm-nm"
          export RANLIB="$TC/bin/llvm-ranlib"
          export STRIP="$TC/bin/llvm-strip"
          export READELF="$TC/bin/llvm-readelf"
          # NOTE: do NOT export LINK — gyp reads it for the HOST linker and breaks.

          # CRITICAL: host build tools must use the host compiler.
          # Without this, configure probes the ARM clang and thinks host_arch=arm,
          # and host tools (torque/mksnapshot) get built with the Android toolchain.
          export CC_host=gcc
          export CXX_host=g++

          # V8 requires 32-bit host tools for 32-bit targets
          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CFLAGS_host=-m32 CXXFLAGS_host=-m32 LDFLAGS_host=-m32
            # KNOWN ISSUE (armeabi-v7a only, unconfirmed against this exact repro):
            # common.gypi unconditionally adds -m64 to host cflags/ldflags when
            # host_arch=="x64" (which GH Actions runners auto-detect as, regardless
            # of dest_cpu). Combined with the -m32 above, host tools may see both
            # -m32 and -m64 on the same command line. Documented by the same
            # engineer who maintains Termux's Node.js build, in the nodejs/node#57748
            # PR description; a common.gypi.patch / v8.gyp.patch pair exists in
            # Termux's packaging (github.com/termux/termux-packages, packages/nodejs-lts)
            # to make cross-compiling for 32-bit not add -m64 to the host build, but
            # neither patch is merged upstream as of this writing — fetch and review
            # them directly from that repo before adopting, rather than trusting a
            # hand-copied version here. armeabi-v7a is experimental/continue-on-error
            # in this workflow already, so this is a "watch for" note, not a blocker.
            #
            # SEPARATE KNOWN ISSUE (also arm/32-bit specific): nodejs/node#58975,
            # "Incorrect selection of x64 push_registers_asm.cc for host build when
            # target is arm" — a gyp source-file-selection bug for the conservative-
            # stack-scanning helper, distinct from the trap-handler fix below. Closed
            # via nodejs/node#57748 but, per that PR's own description, not a complete
            # fix. If the arm (32-bit) leg fails on an undefined push_registers_asm-
            # related symbol specifically, that issue thread is the place to look.
          fi

          # android_ndk_path is REQUIRED (node.gyp fails without it)
          #
          # host_arch/v8_host_arch=x64: defensive gyp hygiene, not a confirmed fix
          # by itself. common.gypi keys its host -m64 cflag/ldflag on host_arch=="x64"
          # explicitly (see common.gypi ~line 536), so pinning it removes ambiguity
          # about what the host toolset resolves to. It does NOT appear to be the
          # actual cause of the mksnapshot undefined-symbol error seen in this repo's
          # CI run — that is a trap-handler.h source-selection issue, fixed by the
          # patch step above (nodejs/node#36287). Kept here as harmless hardening.
          export GYP_DEFINES="OS=android host_os=linux target_arch=${{ matrix.dest_cpu }} v8_target_arch=${{ matrix.dest_cpu }} android_target_arch=${{ matrix.dest_cpu }} android_ndk_path=${ANDROID_NDK_HOME} host_arch=x64 v8_host_arch=x64"

          # LAST-RESORT FALLBACK (only if trap-handler.h.patch above does not clear
          # the mksnapshot link error — e.g. the patch went stale for this Node
          # version, per the staleness history in nodejs/node#60369): forcibly drops
          # the trap-handler/simulator-probe symbols from the link graph instead of
          # fixing the source. Costs WASM OOB-trap fast paths in the resulting
          # libnode.so; leave commented unless the patch step above proves insufficient.
          # export GYP_DEFINES="$GYP_DEFINES v8_enable_webassembly=false"

          # 16 KB page alignment for Android 15/16 devices
          export LDFLAGS="-Wl,-z,max-page-size=16384"

          EXTRA_FLAGS=""
          case "${{ inputs.profile || 'balanced' }}" in
            speed) EXTRA_FLAGS="--enable-lto" ;;
            size)  EXTRA_FLAGS="--v8-lite-mode" ;;
          esac

          # --without-corepack was removed in Node.js v26.x
          NODEEXTRA=""
          if ./configure --help 2>&1 | grep -q without-corepack; then
            NODEEXTRA="--without-corepack"
          fi

          ./configure \
            --cross-compiling \
            --dest-os=android \
            --dest-cpu=${{ matrix.dest_cpu }} \
            --shared \
            --with-intl=none \
            --without-npm \
            $NODEEXTRA \
            --openssl-no-asm \
            $EXTRA_FLAGS

          # LINK.host/AR.host overrides are belt-and-braces (gyp leaves LINK.host empty
          # in some configurations, silently breaking host-tool linking).
          # Build ONLY the 'node' target: produces both out/Release/node (CLI)
          # and out/Release/lib.target/libnode.so (shared library). Skip cctest
          # and other test/auxiliary targets to save 5-10 minutes of build time.
          make -j"$(nproc)" node CC.host=gcc CXX.host=g++ LINK.host=g++ AR.host=ar

      # ---------- 5. Rename, strip, package ----------
      - name: Package lib${{ env.LIB_NAME }}.so + node
        if: success()
        working-directory: node
        run: |
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          LIB="lib${LIB_NAME}.so"
          "$TC/bin/llvm-readelf" -h out/Release/lib.target/libnode.so | grep -E 'Class|Machine|Type'
          cp out/Release/lib.target/libnode.so "$LIB"
          cp out/Release/node node
          "$TC/bin/llvm-strip" --strip-unneeded "$LIB"
          "$TC/bin/llvm-strip" --strip-all node
          if [ "$LIB_NAME" != "node" ]; then
            patchelf --set-soname "$LIB" "$LIB"
            patchelf --replace-needed libnode.so "$LIB" node
          fi
          tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" "$LIB" node
          ls -lh "$LIB" node "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"

      # ---------- 6a. Upload artifact ----------
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}
          path: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}.tar.gz
          retention-days: 14

      # ---------- 6b. Attach to GitHub Release (tag pushes only) ----------
      - name: Attach to GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}.tar.gz