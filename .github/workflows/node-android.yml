# .github/workflows/node-android.yml
# Cross-compiles Node.js for Android: arm64-v8a (verified) + armeabi-v7a (experimental,
# see nodejs/node#58975). Produces per ABI: satu file node (ELF PIE, semua symbol
# Node/V8 diexport lewat -rdynamic/--export-dynamic; tidak ada libnode.so terpisah).
#
# Downstream consumer: AuroraChat-Android (see AGENTS.MD). That project's
# AuroraNodeBridgePlugin spawns the `node` binary as a raw subprocess
# (ProcessBuilder), renamed to jniLibs/arm64-v8a/libaurora_node.so purely so
# Android's APK installer extracts it with executable permissions — it is
# NOT loaded via System.loadLibrary()/dlopen. This matters for packaging: a
# raw-exec'd child process does not automatically inherit the app's
# nativeLibraryDir search path the way a dlopen'd library would, so every
# runtime dependency of `node` must either be statically linked (the case
# today — see the HARD CHECK in the packaging step) or discoverable via an
# rpath baked into the binary itself (the commented Option 2 fallback,
# further below, for if static linking ever breaks). libc++_shared.so is
# still shipped alongside node in the release archive, but only as a plain
# copy for native N-API addons to dlopen — not something node itself needs.
name: Node.js for Android (ARM)

on:
  push:
    branches: [v24.x-lts]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build'
        type: choice
        default: 'v24.x'
        options:
          # Verified 2026-07-18 against nodejs.org release posts: v24.x is Active LTS
          # ("Krypton"), v26.x is Current (entered the Current slot 2026-05-05, becomes
          # LTS 2026-10). Note for later: starting with v27 in Oct 2026, Node moves to one
          # major/year and every release becomes LTS, so this odd/even split goes away —
          # this dropdown will want a straight version-number entry instead of a
          # LTS-vs-latest pairing once that lands. 'custom' already covers it in the
          # meantime via any branch/tag ref.
          - 'v24.x'       # LTS (Krypton)
          - 'v26.x'       # Current (not yet LTS)
          - 'custom'
      custom_ref:
        description: 'Custom git ref — only used when "custom" is selected'
        required: false
        default: ''
      lib_name:
        description: 'Label for this build — used only in the artifact/tar.gz filename (e.g. "aurora" → aurora-android-<abi>.tar.gz). The binary inside stays named `node`; rename it to a lib*.so downstream if your app needs Android to extract it with exec permissions (see AGENTS.MD).'
        required: false
        default: 'node'
      profile:
        description: 'Build profile'
        type: choice
        default: 'balanced'
        options:
          - 'balanced'    # JIT + -O3: best runtime speed (Baileys/server use)
          - 'speed'       # + LTO: faster, much longer build
          - 'size'        # + v8-lite-mode: lower RAM, slower JS/crypto

# A from-scratch V8 cross-compile is expensive (this is not a fast job, especially
# under the `speed` profile's --enable-lto). Group by ref so a second push to the
# same branch/tag cancels the stale run instead of both burning CI minutes in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Bumped off the r27d LTS line to r29 (released 2025-10-06) — verified against
  # github.com/android/ndk/releases and developer.android.com/ndk/downloads on
  # 2026-07-22, where r29 is "Latest" / the current stable, non-LTS release.
  # r27 remains the LTS track and stays supported until r30 (currently beta2)
  # ships as the next LTS, but this workflow is deliberately tracking latest
  # stable rather than LTS now — bump again when r30 goes stable if you want
  # to move back onto the LTS line.
  NDK_VERSION: 'r29'
  MIN_API: '24'                # Node v24+ requires API 24+ (Android 7.0). Do NOT set below 24.
  ANDROID_PLATFORM: 'android-24'

jobs:
  build:
    name: android-${{ matrix.abi }}
    # Pinned instead of floating `ubuntu-latest`. GitHub rolled ubuntu-latest onto a
    # new default image 2026-06-08→06-15 (24.04 → 26.04, per actions/runner-images —
    # verified 2026-07-18, i.e. that migration is already behind us or finishing right
    # about now), following the same 22.04→24.04 pattern from late 2024/early 2025.
    # GitHub's own runner-images docs recommend pinning for exactly this reason. This
    # build is sensitive to the runner's default gcc/g++ and python3 versions (see the
    # GCC-specific turboshaft-Tuple patch below, and the Python >=3.10 check in the
    # host-tools step) and to gcc-multilib/g++-multilib packaging for the armeabi-v7a
    # leg — not things that should shift under this workflow on a random day because
    # GitHub silently repointed a floating label. Bump this deliberately when ready to
    # validate the new image, rather than inheriting it automatically.
    runs-on: ubuntu-24.04
    # armeabi-v7a is best-effort: upstream V8 cross-build for 32-bit targets on
    # x64 hosts has open bugs (nodejs/node#58975). Never let it block arm64.
    continue-on-error: ${{ matrix.experimental || false }}
    # From-scratch V8+Node cross-compile; --enable-lto (speed profile) especially can
    # run long. Without this, a genuine hang rides the GH Actions default of 360
    # minutes before anything stops it. 180 is generous headroom over normal runs
    # (including LTO) without leaving the job free to run indefinitely.
    timeout-minutes: 180
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a            # 64-bit ARM — verified working
            dest_cpu: arm64
            target: aarch64-linux-android
          - abi: armeabi-v7a          # 32-bit ARM — experimental
            dest_cpu: arm
            target: armv7a-linux-androideabi
            experimental: true

    steps:
      # ---------- 0. Resolve inputs ----------
      # SECURITY: custom_ref and lib_name are free-text workflow_dispatch inputs. They
      # are passed in via `env:` and read as shell variables ($CUSTOM_REF_RAW etc.)
      # below, NOT interpolated as ${{ }} inside the script body. Splicing free text
      # straight into a run: block lets shell metacharacters in the input execute as
      # part of the script itself, before the regex validation a few lines down ever
      # runs — this is GitHub's own documented script-injection class (see "Script
      # injections" / "Security hardening for GitHub Actions" in the Actions docs;
      # the `env:` intermediate-variable pattern is their recommended fix). Given this
      # job also holds `permissions: contents: write`, a successful injection here
      # could push content or forge a release, not just leak a token. node_version and
      # profile don't need this treatment — they're `type: choice`, so GitHub itself
      # restricts them to the listed options before this step ever runs.
      - name: Resolve inputs
        env:
          NODE_VERSION_CHOICE: ${{ inputs.node_version || 'v24.x' }}
          CUSTOM_REF_RAW: ${{ inputs.custom_ref }}
          LIB_NAME_RAW: ${{ inputs.lib_name || 'node' }}
        run: |
          REQ="$NODE_VERSION_CHOICE"
          if [ "$REQ" = "custom" ]; then REQ="$CUSTOM_REF_RAW"; fi
          test -n "$REQ" || { echo "::error::custom_ref is empty"; exit 1; }
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="$LIB_NAME_RAW"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          if ! [[ "$NAME" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "::error::Invalid lib_name '$NAME'"; exit 1
          fi
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Building Node.js '$REQ' — artifact label: $NAME (binary itself stays named 'node')"

      # ---------- 1. Android NDK ----------
      # @v1 is a floating major tag; it already resolves to 1.5.0 (current as of
      # 2026-07-18) so no change needed here. If you want to harden against the tag
      # being repointed later (this job holds contents: write), pin to the release
      # commit SHA instead of @v1 — GitHub's own actions-hardening guidance recommends
      # this for third-party actions generally.
      - name: Set up Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Verify NDK toolchain paths
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-$ANDROID_NDK}" >> "$GITHUB_ENV"
          TC="${ANDROID_NDK_HOME:-$ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          test -x "$TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"

      # ---------- 1b. ccache ----------
      # Everything above this point is seconds; the ~2h this job takes is almost
      # entirely the make step in section 4 — a from-scratch V8+Node compile with
      # no object reuse between runs. ccache fixes that: it caches compiled objects
      # by actual preprocessed source+flags content, so reruns/retries and
      # iterating on this workflow (not on Node's own source) get much faster once
      # warm. A brand-new Node ref/ABI/profile combo still pays the full build time
      # on its first run — the win is every run after that.
      - name: Configure ccache
        run: |
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=2G" >> "$GITHUB_ENV"

      - name: Cache ccache directory
        # @v5 verified current 2026-07-18 (runs on Node 24, needs Actions Runner
        # >=2.327.1 — both already satisfied by the ubuntu-24.04 hosted runner).
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          # run_id in the primary key means this always saves (so the cache keeps
          # accumulating objects run over run); restore-keys prefix-matches the
          # most recent cache for this abi+ref+profile combo regardless of run_id.
          key: ccache-${{ matrix.abi }}-${{ env.NODE_REF }}-${{ inputs.profile || 'balanced' }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.abi }}-${{ env.NODE_REF }}-${{ inputs.profile || 'balanced' }}-

      # ---------- 2. Host build tools ----------
      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 g++ make git ca-certificates ccache curl

          # Node.js 26.x dropped support for building from source with Python < 3.10
          # (verified against the "What's new in Node.js 26" release notes, 2026-07-18).
          # ubuntu-24.04's default python3 (3.12) already clears this, but fail with a
          # clear message here rather than an opaque gyp/python error after the build
          # has already been running for a while — this matters more once someone points
          # node_version at v26.x or a custom v26+ ref.
          PYVER="$(python3 -c 'import sys; print("%d.%d" % sys.version_info[:2])')"
          python3 -c 'import sys; sys.exit(0 if sys.version_info[:2] >= (3, 10) else 1)' \
            || { echo "::error::python3 is $PYVER, but Node >=26 needs >=3.10 to build from source"; exit 1; }
          echo "python3 $PYVER OK"

      # ---------- 2b. patchelf (pinned upstream release, NOT apt) ----------
      # NOTE: Only required if you switch to OPTION 2 below (bundled libc++_shared.so).
      # For the default fully-static build this tool is installed but unused.
      - name: Install patchelf (latest upstream release, pinned per-run)
        run: |
          LATEST_URL="$(curl -fsSL -o /dev/null -w '%{url_effective}' \
            https://github.com/NixOS/patchelf/releases/latest)"
          PATCHELF_VERSION="${LATEST_URL##*/}"
          echo "Resolved NixOS/patchelf latest release: $PATCHELF_VERSION"
          if ! [[ "$PATCHELF_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Could not resolve a valid patchelf version from /releases/latest (got '$PATCHELF_VERSION'). Refusing to silently fall back to a possibly-buggy version — fix this step or pin PATCHELF_VERSION manually."
            exit 1
          fi

          ASSET="patchelf-${PATCHELF_VERSION}-x86_64.tar.gz"
          ASSET_URL="https://github.com/NixOS/patchelf/releases/download/${PATCHELF_VERSION}/${ASSET}"
          curl -fsSL -o /tmp/patchelf.tar.gz "$ASSET_URL"
          mkdir -p /tmp/patchelf-extracted
          tar xzf /tmp/patchelf.tar.gz -C /tmp/patchelf-extracted
          sudo install -m 0755 /tmp/patchelf-extracted/bin/patchelf /usr/local/bin/patchelf
          hash -r

          echo "---- patchelf version in use ----"
          patchelf --version
          RESOLVED="$(command -v patchelf)"
          echo "Resolved patchelf binary: $RESOLVED"
          [ "$RESOLVED" = "/usr/local/bin/patchelf" ] \
            || { echo "::error::patchelf resolved to '$RESOLVED', not /usr/local/bin/patchelf — PATH ordering issue, apt's older copy would silently win"; exit 1; }

      - name: Install 32-bit multilib (armeabi-v7a only)
        if: matrix.dest_cpu == 'arm'
        run: sudo apt-get install -y gcc-multilib g++-multilib
        # V8 mandates 32-bit host tools when targeting 32-bit arm.

      # ---------- 3. Node.js source ----------
      - name: Clone Node.js (${{ env.NODE_REF }})
        run: git clone --depth 1 --branch "$NODE_REF" https://github.com/nodejs/node.git node

      # ---------- 3a. Resolve actual Node.js version ----------
      # NODE_REF (from the node_version input, e.g. "v24.x") is just the git
      # ref that was asked for — the workflow_dispatch dropdown offers
      # v26.x/v24.x, which are MOVING branches, not fixed tags (confirmed
      # against nodejs/node: refs/heads/v26.x and refs/heads/v24.x both
      # exist and advance as releases land on them). So NODE_REF alone
      # never tells you which actual Node.js version — 24.17.0? 24.18.1? —
      # ended up in this specific build; it's the same literal string
      # every run regardless of what the branch pointed to that day. That
      # made every artifact filename and release title equally vague
      # regardless of when the workflow ran.
      #
      # Fix: read the version macros Node.js itself embeds in
      # src/node_version.h — NODE_MAJOR_VERSION / NODE_MINOR_VERSION /
      # NODE_PATCH_VERSION / NODE_VERSION_IS_RELEASE — right after clone,
      # so this reflects whatever commit was ACTUALLY checked out this
      # run, regardless of whether NODE_REF was a moving branch, a fixed
      # tag, or an arbitrary custom_ref/SHA. Verified directly against
      # nodejs/node: cloning branch v24.x today resolves to 24.18.1
      # (commit 9de263aa88, NODE_VERSION_IS_RELEASE=0 — i.e. this exact
      # commit isn't itself a tagged release, just where the release
      # branch currently sits); cloning the tag v24.10.0 resolves to
      # 24.10.0 with NODE_VERSION_IS_RELEASE=1. The -dev suffix below
      # distinguishes those two cases so a build off a moving branch is
      # never confused for an official tagged release.
      #
      # RESOLVED_NODE_VERSION / NODE_COMMIT_SHORT are consumed by the
      # artifact-naming steps in section 6a/6b and the release job further
      # below (which re-derives them from the downloaded artifact
      # folder's own name rather than plumbing GITHUB_ENV across
      # jobs/matrix legs — see the release job's "Resolve inputs" step for
      # why).
      - name: Resolve actual Node.js version
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import re
          import pathlib
          import subprocess
          import os

          vh_path = pathlib.Path('src/node_version.h')
          vh = vh_path.read_text()

          def grab(name):
              m = re.search(rf'#define\s+{name}\s+(\S+)', vh)
              if not m:
                  print(f"::error::could not find {name} in {vh_path}")
                  raise SystemExit(1)
              return m.group(1)

          major = grab('NODE_MAJOR_VERSION')
          minor = grab('NODE_MINOR_VERSION')
          patch = grab('NODE_PATCH_VERSION')
          is_release = grab('NODE_VERSION_IS_RELEASE')

          version = f"{major}.{minor}.{patch}"
          if is_release != "1":
              version += "-dev"

          sha_full = subprocess.check_output(
              ['git', 'rev-parse', 'HEAD'], text=True
          ).strip()
          sha_short = sha_full[:10]

          # Sanity check: version must be a plain dotted-numeric triple
          # (optionally -dev), since it flows straight into filenames —
          # never trust an upstream macro format silently enough to skip
          # this before it becomes part of a path GitHub uploads.
          if not re.fullmatch(r'\d+\.\d+\.\d+(-dev)?', version):
              print(f"::error::resolved version '{version}' failed sanity check")
              raise SystemExit(1)

          gh_env = os.environ['GITHUB_ENV']
          with open(gh_env, 'a') as f:
              f.write(f"RESOLVED_NODE_VERSION={version}\n")
              f.write(f"NODE_COMMIT_SHA={sha_full}\n")
              f.write(f"NODE_COMMIT_SHORT={sha_short}\n")

          print(f"Requested ref:     {os.environ.get('NODE_REF', '(unset)')}")
          print(f"Resolved version:  {version}")
          print(f"Commit:            {sha_full}")
          PYEOF

      # ---------- 3b. Patch known Android cross-build issues ----------
      # Android is not an officially tested/supported Node.js target (core team
      # position, see nodejs/node#58505) — these are community-tracked issues
      # carried by Termux's Node.js packaging for years and partially upstreamed.
      # Expect this list to need revisiting on every Node major bump.
      - name: Patch V8 for Android cross-build
        working-directory: node
        run: |
          python3 - <<'PYEOF' 2>&1 | tee /tmp/android-patch.log
          import pathlib
          import textwrap

          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping — may be version-specific)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path} (maybe already fixed upstream)")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          patch('deps/v8/src/base/debug/stack_trace_posix.cc',
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"',
                '#if defined(__ANDROID__)\n'
                'extern "C" int backtrace(void**, int) { return 0; }\n'
                'extern "C" char** backtrace_symbols(void* const*, int) { return nullptr; }\n'
                'extern "C" void backtrace_symbols_fd(void* const*, int, int) {}\n'
                '#endif\n\n'
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"')

          patch('deps/v8/src/base/small-vector.h',
                '  ASSERT_TRIVIALLY_COPYABLE(T);',
                '  // ASSERT_TRIVIALLY_COPYABLE(T);  // android xbuild: nodejs/node#58975')

          patch('deps/v8/src/trap-handler/trap-handler.h',
                textwrap.dedent('''\
                    // X64 on Linux, Windows, MacOS, FreeBSD.
                    #if V8_HOST_ARCH_X64 && V8_TARGET_ARCH_X64 &&                        \\
                        ((V8_OS_LINUX && !V8_OS_ANDROID) || V8_OS_WIN || V8_OS_DARWIN || \\
                         V8_OS_FREEBSD)
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Arm64 (non-simulator) on Linux, Windows, MacOS.
                    #elif V8_TARGET_ARCH_ARM64 && V8_HOST_ARCH_ARM64 && \\
                        ((V8_OS_LINUX && !V8_OS_ANDROID) || V8_OS_WIN || V8_OS_DARWIN)
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Arm64 simulator on x64 on Linux, Mac, or Windows.
                    //
                    // The simulator case uses some inline assembly code, which cannot be
                    // compiled with MSVC, so don't enable the trap handler in that case.
                    // (MSVC #defines _MSC_VER, but so does Clang when targeting Windows, hence
                    // the check for __clang__.)
                    #elif V8_TARGET_ARCH_ARM64 && V8_HOST_ARCH_X64 && \\
                        (V8_OS_LINUX || V8_OS_DARWIN || V8_OS_WIN) && \\
                        (!defined(_MSC_VER) || defined(__clang__))
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Loong64 (non-simulator) on Linux.
                    #elif V8_TARGET_ARCH_LOONG64 && V8_HOST_ARCH_LOONG64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Loong64 simulator on x64 on Linux
                    #elif V8_TARGET_ARCH_LOONG64 && V8_HOST_ARCH_X64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // RISCV64 (non-simulator) on Linux.
                    #elif V8_TARGET_ARCH_RISCV64 && V8_HOST_ARCH_RISCV64 && V8_OS_LINUX && \\
                        !V8_OS_ANDROID
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // RISCV64 simulator on x64 on Linux
                    #elif V8_TARGET_ARCH_RISCV64 && V8_HOST_ARCH_X64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Everything else is unsupported.
                    #else
                    #define V8_TRAP_HANDLER_SUPPORTED false
                    #endif'''),
                '#define V8_TRAP_HANDLER_SUPPORTED false')

          patch('deps/uv/uv.gyp',
                '\n'.join([
                    "      'target_name': 'libuv',",
                    "      'toolsets': ['host', 'target'],",
                    "      'type': '<(uv_library)',",
                    "      'include_dirs': [",
                    "        'include',",
                    "        'src/',",
                    "      ],",
                ]),
                '\n'.join([
                    "      'target_name': 'libuv',",
                    "      'toolsets': ['host', 'target'],",
                    "      'type': '<(uv_library)',",
                    "      'include_dirs+': [",
                    "        'include',",
                    "        'src/',",
                    "      ],",
                ]))

          patch('deps/uv/uv.gyp',
                "        'include_dirs': [ 'include' ],",
                "        'include_dirs+': [ 'include' ],")

          patch('deps/uv/src/unix/fs.c',
                textwrap.dedent("""\
                    #ifdef FICLONE
                      if (req->flags & UV_FS_COPYFILE_FICLONE ||
                          req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {"""),
                textwrap.dedent("""\
                    #ifndef __ANDROID__
                    #ifdef FICLONE
                      if (req->flags & UV_FS_COPYFILE_FICLONE ||
                          req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {"""))

          patch('test/cctest/test_crypto_clienthello.cc',
                "    alloc_base = static_cast<uint8_t*>(aligned_alloc(page, 2 * page));",
                "    CHECK_EQ(posix_memalign(reinterpret_cast<void**>(&alloc_base), page, 2 * page), 0);")

          v8config_h = pathlib.Path('deps/v8/include/v8config.h')
          s = v8config_h.read_text()
          old_atomic_line = '#include <memory>'
          new_polyfill_block = (
              '#include <memory>\n'
              '#if defined(__ANDROID__) && !defined(__cpp_lib_atomic_ref)\n'
              '#ifndef V8_STD_ATOMIC_REF_POLYFILL\n'
              '#define V8_STD_ATOMIC_REF_POLYFILL\n'
              'namespace std {\n'
              'template <typename T>\n'
              'struct atomic_ref {\n'
              '  explicit atomic_ref(T& obj) : ptr_(&obj) {}\n'
              '  void store(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    __atomic_store_n(ptr_, val, static_cast<int>(order)); }\n'
              '  T load(memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_load_n(ptr_, static_cast<int>(order)); }\n'
              '  T exchange(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_exchange_n(ptr_, val, static_cast<int>(order)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order success, memory_order failure) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(success), static_cast<int>(failure)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(order), static_cast<int>(order)); }\n'
              '  T fetch_add(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_add(ptr_, val, static_cast<int>(order)); }\n'
              '  T fetch_or(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_or(ptr_, val, static_cast<int>(order)); }\n'
              'private:\n'
              '  T* ptr_;\n'
              '};\n'
              '}  // namespace std\n'
              '#endif\n'
              '#endif')
          if old_atomic_line in s:
              s = s.replace(old_atomic_line, new_polyfill_block, 1)
              v8config_h.write_text(s)
              print("patched deps/v8/include/v8config.h (std::atomic_ref polyfill)")
          else:
              print("::warning::could not find '#include <memory>' in v8config.h")

          patch('deps/v8/src/base/memcopy.h',
                '    std::atomic_ref<T>(destination[i]).store(value, std::memory_order_relaxed);',
                '    __atomic_store_n(&destination[i], value, __ATOMIC_RELAXED);')

          reducer_h = pathlib.Path('deps/v8/src/compiler/turboshaft/int64-lowering-reducer.h')
          s = reducer_h.read_text()
          old_tuple_call = 'return __ Tuple<Word32, Word32>(result, __ Word32Constant(0));'
          count = s.count(old_tuple_call)
          if count == 0:
              print("::warning::could not find explicit-template Tuple<Word32,Word32> call in int64-lowering-reducer.h (maybe already fixed upstream)")
          else:
              s = s.replace(old_tuple_call, 'return __ template Tuple<Word32, Word32>(result, __ Word32Constant(0));')
              reducer_h.write_text(s)
              print(f"patched deps/v8/src/compiler/turboshaft/int64-lowering-reducer.h ({count} occurrence(s) of explicit-template Tuple call)")

          zlib_c = pathlib.Path('deps/zlib/cpu_features.c')
          s = zlib_c.read_text()
          old_incl = (
              '#if defined(ARMV8_OS_ANDROID)\n'
              '#include <cpu-features.h>\n'
              '#elif defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          new_incl = (
              '#if defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          if old_incl in s:
              s = s.replace(old_incl, new_incl, 1)
              print("patched deps/zlib/cpu_features.c (includes)")
          else:
              print("::warning::could not find Android/Linux include block in cpu_features.c")

          old_aarch64 = (
              '#if defined(ARMV8_OS_ANDROID) && defined(__aarch64__)\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM64_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM64_FEATURE_PMULL);')
          new_aarch64 = (
              '#if (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && defined(__aarch64__)\n'
              '    unsigned long features = getauxval(AT_HWCAP);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP_PMULL);')
          if old_aarch64 in s:
              s = s.replace(old_aarch64, new_aarch64, 1)
              print("patched deps/zlib/cpu_features.c (aarch64)")
          else:
              print("::warning::could not find Android aarch64 branch in cpu_features.c")

          old_aarch32 = (
              '#elif defined(ARMV8_OS_ANDROID) /* aarch32 */\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM_FEATURE_PMULL);')
          new_aarch32 = (
              '#elif (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && (defined(__ARM_NEON) || defined(__ARM_NEON__))\n'
              '    unsigned long features = getauxval(AT_HWCAP2);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP2_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP2_PMULL);')
          if old_aarch32 in s:
              s = s.replace(old_aarch32, new_aarch32, 1)
              print("patched deps/zlib/cpu_features.c (aarch32)")
          else:
              print("::warning::could not find Android aarch32 branch in cpu_features.c")
          zlib_c.write_text(s)

          fs_c = pathlib.Path('deps/uv/src/unix/fs.c')
          s = fs_c.read_text()
          old_close = '\n'.join([
              '    goto out;',
              '  }',
              '#endif',
              '',
              '  bytes_to_send = src_statsbuf.st_size;',
          ])
          new_close = '\n'.join([
              '    goto out;',
              '  }',
              '#endif',
              '#endif',
              '',
              '  bytes_to_send = src_statsbuf.st_size;',
          ])
          if old_close not in s:
              print("::warning::context not found for FICLONE #endif close in deps/uv/src/unix/fs.c")
          else:
              fs_c.write_text(s.replace(old_close, new_close, 1))
              print("closed #ifndef __ANDROID__ block in deps/uv/src/unix/fs.c")
          PYEOF

          echo "Skipped from Termux's nodejs-lts patch set (reviewed, not applicable to a non-Termux NDK cross-build):"
          echo "  - common.gypi.patch: removes an OS==\"android\" cflags/ldflags stanza tied to"
          echo "    Termux's own android_ndk_path/cpufeatures usage."
          echo "  - deps-uv-src-unix-core.c.patch, deps-v8-src-flags-flag-definitions.h.patch:"
          echo "    swap /data/local/tmp for a literal @TERMUX_PREFIX@/tmp placeholder."
          echo "  - deps-uvwasi-src-uvwasi.c.patch: re-enables WASI readdir support on Android,"
          echo "    relying on Termux's libc environment."
          echo "  - deps-uv-src-unix-process.c.patch: strips post-fork privilege-drop calls."

          FAILED_PATCHES="$(grep -c '::warning::' /tmp/android-patch.log || true)"
          if [ "${FAILED_PATCHES:-0}" -gt 0 ]; then
            echo "::warning::$FAILED_PATCHES Android patch attempt(s) above did not apply cleanly — see the ::warning:: lines above."
          else
            echo "All expected Android patches applied cleanly."
          fi

      # ---------- 3c. Patch OpenSSL asm target selection for Android ----------
      # Root cause of "invalid output constraint '=a'/'+d' in asm" in
      # deps/openssl/openssl/crypto/bn/asm/x86_64-gcc.c, on BOTH arm64-v8a
      # and armeabi-v7a, on both v24.x and v26.x — confirmed by generating
      # openssl.target.mk directly via configure.py with this build's real
      # GYP_DEFINES (OS=android, target_arch=arm64 and target_arch=arm) and
      # diffing against the same run with target_arch=arm64/OS=linux:
      #
      # deps/openssl/openssl_asm.gypi selects which arch-specific asm gypi
      # gets included via a single and/or condition chain. Its
      # target_arch=="arm" branch requires OS=="linux" exactly; its
      # target_arch=="arm64" branch requires OS in "linux openharmony".
      # Neither matches OS=="android" (this build's --dest-os), so BOTH
      # ARM legs fall through every named branch to the file's final,
      # unconditional catchall — commented "Other architectures don't use
      # assembly" but which actually includes
      # config/archs/linux-x86_64/asm/openssl.gypi, i.e. real x86_64 GNU
      # inline assembly using register-class constraints ("=a"/"+d" ->
      # rax/rdx) that don't exist on any ARM target. This is why the
      # failure reproduced identically regardless of which leg had
      # --openssl-no-asm passed or not (see the removed flag-inversion
      # workaround in the Cross-compile step's history): the flag only
      # controls whether openssl_asm.gypi's conditions run at all
      # (openssl_no_asm==1 skips the whole file per openssl.gyp); it
      # can't change what a given condition resolves to once evaluated,
      # and both legs were resolving to the same wrong branch.
      #
      # Fix: add OS=="android" to the arm and arm64 branches, ahead of the
      # x86_64 catchall, so Android cross-builds pull the real
      # linux-armv4/linux-aarch64 perlasm gypi files instead (these are
      # genuine GNU-as .S files targeting the correct ISA — AArch64/ARMv4
      # NEON and crypto-extension asm — not x86 inline asm, so there's no
      # register-constraint mismatch risk of the kind that broke here).
      # Verified directly: after this patch, the same configure.py
      # invocations that previously produced 1x x86_64-gcc.c reference and
      # 0x aarch64/armv4 references now produce 0x x86_64-gcc.c and
      # 42x/35x aarch64/armv4 references respectively, for arm64 and arm.
      #
      # Also corrects the catchall's comment, which claims "don't use
      # assembly" while doing the opposite — actively including x86_64
      # assembly. Left the catchall itself untouched (still needed for
      # whatever legitimately-asm-less combinations rely on it; not
      # auditing those here) beyond that comment fix.
      - name: "Patch OpenSSL: asm target selection for Android (arm/arm64)"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib

          gypi = pathlib.Path('deps/openssl/openssl_asm.gypi')
          if not gypi.exists():
              print("::warning::deps/openssl/openssl_asm.gypi not found")
          else:
              s = gypi.read_text()

              arm_old = 'target_arch=="arm" and OS=="linux"'
              arm_new = 'target_arch=="arm" and OS in "linux android"'
              if arm_old in s:
                  s = s.replace(arm_old, arm_new, 1)
                  print(f"patched {gypi} (arm branch)")
              else:
                  print(f"::warning::arm branch text not found in {gypi}")

              arm64_old = 'target_arch=="arm64" and OS in "linux openharmony"'
              arm64_new = 'target_arch=="arm64" and OS in "linux openharmony android"'
              if arm64_old in s:
                  s = s.replace(arm64_old, arm64_new, 1)
                  print(f"patched {gypi} (arm64 branch)")
              else:
                  print(f"::warning::arm64 branch text not found in {gypi}")

              # Fix the misleading catchall comment (cosmetic, but this
              # comment directly caused confusion during triage — leaving
              # it wrong would mislead the next person too).
              old_comment = "      # Other architectures don't use assembly\n"
              new_comment = (
                  "      # NOTE: despite this comment, this branch actually\n"
                  "      # includes x86_64 GNU inline-asm (linux-x86_64/asm/\n"
                  "      # openssl.gypi), unconditionally, for any\n"
                  "      # target_arch/OS combination not matched above. If a\n"
                  "      # non-x86_64 target hits 'invalid output constraint\n"
                  "      # ...in asm' in x86_64-gcc.c, add that target's OS to\n"
                  "      # the correct arch-specific branch above instead of\n"
                  "      # touching this fallback.\n"
              )
              if old_comment in s:
                  s = s.replace(old_comment, new_comment, 1)
                  print(f"patched {gypi} (catchall comment)")
              else:
                  print("::warning::catchall comment text not found (already patched or upstream reworded it)")

              gypi.write_text(s)

              # ----- Post-patch sanity checks -----
              s = gypi.read_text()
              errors = []
              if 'OS in "linux android"' not in s:
                  errors.append("arm branch: expected replacement text missing")
              if 'OS in "linux openharmony android"' not in s:
                  errors.append("arm64 branch: expected replacement text missing")
              if 'target_arch=="arm" and OS=="linux"\'' in s:
                  errors.append("arm branch: old unpatched text still present")
              if 'target_arch=="arm64" and OS in "linux openharmony"\'' in s:
                  errors.append("arm64 branch: old unpatched text still present")
              if errors:
                  for e in errors:
                      print(f"::error::PATCH FAILED: {e}")
                  exit(1)
              print("patch syntax sanity check: OK")
          PYEOF

      # ---------- 4. Cross-compile ----------
      - name: Cross-compile Node.js for ${{ matrix.abi }}
        working-directory: node
        run: |
          export TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"

          # Target toolchain (API level via wrapper suffix == -DANDROID_PLATFORM=android-24)
          export CC="ccache $TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"
          export CXX="ccache $TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang++"
          # Static-link libc++ -> 1 file output, no libc++_shared.so needed
          export CXXFLAGS="$CXXFLAGS -static-libstdc++"
          # FIX: old workflow had a second 'export LDFLAGS=...' that overwrote this,
          # silently discarding -static-libstdc++. Merged into one line:
          export LDFLAGS="$LDFLAGS -static-libstdc++ -Wl,-z,max-page-size=16384 -rdynamic -Wl,--export-dynamic"
          export AR="$TC/bin/llvm-ar"
          export NM="$TC/bin/llvm-nm"
          export RANLIB="$TC/bin/llvm-ranlib"
          export STRIP="$TC/bin/llvm-strip"
          export READELF="$TC/bin/llvm-readelf"
          # NOTE: do NOT export LINK — gyp reads it for the HOST linker and breaks.

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CC_host="ccache gcc -m32"
            export CXX_host="ccache g++ -m32"
          else
            export CC_host="ccache gcc"
            export CXX_host="ccache g++"
          fi

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CFLAGS_host=-m32 CXXFLAGS_host=-m32 LDFLAGS_host=-m32
            HOST_ARCH_GYP="ia32"
          else
            HOST_ARCH_GYP="x64"
          fi

          export GYP_DEFINES="OS=android host_os=linux target_arch=${{ matrix.dest_cpu }} v8_target_arch=${{ matrix.dest_cpu }} android_target_arch=${{ matrix.dest_cpu }} android_ndk_path=${ANDROID_NDK_HOME} host_arch=$HOST_ARCH_GYP v8_host_arch=$HOST_ARCH_GYP"

          EXTRA_FLAGS=""
          case "${{ inputs.profile || 'balanced' }}" in
            speed) EXTRA_FLAGS="--enable-lto" ;;
            size)  EXTRA_FLAGS="--v8-lite-mode" ;;
          esac

          # ---- Crypto perf: use OpenSSL's asm-optimized routines where safe ----
          # UPDATED 2026-07-22 (second pass): the actual bug was upstream in
          # deps/openssl/openssl_asm.gypi, not in this flag. That file's
          # target_arch=="arm"/"arm64" branches require OS=="linux" (or
          # "openharmony" for arm64) — our cross-build sets OS=android, which
          # matched neither, so BOTH legs fell through to the file's final
          # catchall branch, mislabeled "Other architectures don't use
          # assembly" but which actually includes x86_64 GNU inline-asm
          # (crypto/bn/asm/x86_64-gcc.c's "=a"/"+d" register-class
          # constraints — rax/rdx, which don't exist on any ARM target).
          # This reproduced identically on v24 and v26, and on both arm64
          # and arm, regardless of this flag's value — because the flag
          # only chooses whether openssl_asm.gypi's arch/OS conditions get
          # evaluated at all; it can't fix what they resolve to once
          # evaluated. Confirmed directly against configure.py's generated
          # openssl.target.mk: unpatched, target_arch=arm64+OS=android
          # produces 1 x86_64-gcc.c reference and 0 aarch64 references;
          # same for target_arch=arm. The "Patch OpenSSL: asm target
          # selection for Android" step above adds OS=="android" to the
          # arm/arm64 branches (ahead of the mislabeled catchall), after
          # which the same configure resolves to real GNU-as AArch64/ARMv4
          # perlasm (linux-aarch64/linux-armv4, 42/35 source references,
          # 0 x86_64-gcc.c) on both legs.
          #
          # With that fixed at the source, asm is genuinely safe on both
          # legs — the flag can go back to being a simple on/off rather
          # than the previous single-run flag-inversion attempt (which
          # only relocated the same failure between legs; both legs were
          # always hitting the same upstream fallback, just via whichever
          # leg had the flag enabling asm at all). Left OFF here regardless
          # so a regression in the patch step (e.g. this Node version
          # renames/removes openssl_asm.gypi's conditions block) fails as
          # a normal build error rather than resurfacing this exact
          # 20-error asm cascade; flip to enabling by default once this
          # has run clean at least once end-to-end on CI.
          OPENSSL_ASM_FLAG="--openssl-no-asm"

          NODEEXTRA=""
          if ./configure --help 2>&1 | grep -q without-corepack; then
            NODEEXTRA="--without-corepack"
          fi

          ./configure \
            --cross-compiling \
            --dest-os=android \
            --dest-cpu=${{ matrix.dest_cpu }} \
            --with-intl=none \
            --without-npm \
            $NODEEXTRA \
            $OPENSSL_ASM_FLAG \
            $EXTRA_FLAGS

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            make -j"$(nproc)" node CC.host="ccache gcc -m32" CXX.host="ccache g++ -m32" LINK.host="g++ -m32" AR.host=ar
          else
            make -j"$(nproc)" node CC.host="ccache gcc" CXX.host="ccache g++" LINK.host="g++" AR.host=ar
          fi

          echo "---- ccache stats (${{ matrix.abi }}) ----"
          ccache -s

      # ---------- 5. Rename, strip, package ----------
      # DEFAULT (Option 1): Fully static single binary — zero bundled .so files.
      # OPTION 2 (commented below): Bundle libc++_shared.so + bake $ORIGIN rpath.
      #
      # FIXED 2026-07-23: this step used to end after producing node/
      # libc++_shared.so raw in the working directory, and a separate
      # "Package Node.js headers" step (old 5b) staged headers into an
      # unrelated node-headers/ folder. Those fed two separate
      # upload-artifact calls (old 6a/6b), which meant every ABI shipped
      # as TWO release assets — binary+libc++ in one zip, headers in
      # another. That's the "not separated" complaint this fix addresses:
      # binary, libc++_shared.so, and headers now all get staged into one
      # directory (STAGE_DIR below) in this same step, so the one
      # upload-artifact call further down produces one self-contained
      # artifact per ABI, which the release job's "Assemble release
      # archives" step zips whole into one release asset. See that step's
      # comment for the full before/after.
      - name: Package node (fully static single binary)
        if: success()
        working-directory: node
        run: |
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          echo "Directory structure under out/Release:"
          find out/Release -maxdepth 3 -type d

          if [ ! -f "out/Release/node" ]; then
            echo "::error::out/Release/node not found — build step may have failed"
            exit 1
          fi

          "$TC/bin/llvm-readelf" -h "out/Release/node" | grep -E 'Class|Machine|Type'

          if [ ! -e node ] || [ "$(readlink -f out/Release/node)" != "$(readlink -f node)" ]; then
            cp out/Release/node node
          else
            echo "out/Release/node and node are already the same file, skipping copy"
          fi

          # --export-dynamic marks symbols via .dynsym, so strip-all is safe.
          "$TC/bin/llvm-strip" --strip-all node

          echo "---- ELF type check ----"
          "$TC/bin/llvm-readelf" -h node | grep -E 'Class|Machine|Type'
          echo "---- Exported dynamic symbol count ----"
          "$TC/bin/llvm-readelf" --dyn-syms node | wc -l

          # ---- HARD CHECK: libc++ must be statically linked ----
          echo "---- NEEDED entries (must NOT contain libc++_shared.so) ----"
          NEEDED="$("$TC/bin/llvm-readelf" -d node | grep NEEDED || true)"
          echo "$NEEDED"

          if echo "$NEEDED" | grep -q 'libc++_shared'; then
            echo "::error::node still links dynamically against libc++_shared.so. The -static-libstdc++ flag did not take effect. Inspect the link command above."
            exit 1
          fi

          # ---- Verify ELF hash table is intact ----
          READELF_OUT="$("$TC/bin/llvm-readelf" -d node 2>&1)"
          if ! echo "$READELF_OUT" | grep -qE '\(GNU_HASH\)|\(HASH\)'; then
            echo "::error::'node' has neither DT_HASH nor DT_GNU_HASH — will fail to load on-device."
            echo "$READELF_OUT"
            exit 1
          fi

          # ---- Bundle libc++_shared.so alongside node (NOT linked into it) ----
          # node itself stays fully static (the HARD CHECK above already proves
          # it has no NEEDED libc++_shared.so entry) — this copy exists purely
          # for downstream native N-API addons that dlopen libc++_shared.so at
          # runtime and expect to find it next to the host binary. No patchelf,
          # no rpath: node does not load this file itself.
          case "${{ matrix.dest_cpu }}" in
            arm) SYSROOT_TRIPLE="arm-linux-androideabi" ;;
            *)   SYSROOT_TRIPLE="${{ matrix.target }}" ;;
          esac
          cp "$TC/sysroot/usr/lib/${SYSROOT_TRIPLE}/libc++_shared.so" .
          ls -lh node libc++_shared.so

          # ============================================================
          # OPTION 2 — COMMENTED FALLBACK (do NOT delete)
          # ------------------------------------------------------------
          # If a future Node ref breaks -static-libstdc++ propagation through
          # gyp and node ends up NEEDING libc++_shared.so at runtime (not just
          # shipping it as a courtesy copy for addons), comment out the block
          # above (from "cp out/Release/node node" down to the "ls -lh node
          # libc++_shared.so" line) and uncomment the patchelf/rpath block
          # below instead — this one bakes an $ORIGIN rpath so node itself
          # can find and dlopen libc++_shared.so.
          # ------------------------------------------------------------
          # cp out/Release/node node
          # "$TC/bin/llvm-strip" --strip-all node
          #
          # # Sysroot triple remap for 32-bit ARM
          # case "${{ matrix.dest_cpu }}" in
          #   arm) SYSROOT_TRIPLE="arm-linux-androideabi" ;;
          #   *)   SYSROOT_TRIPLE="${{ matrix.target }}" ;;
          # esac
          # cp "$TC/sysroot/usr/lib/${SYSROOT_TRIPLE}/libc++_shared.so" .
          # patchelf --set-rpath '$ORIGIN' node
          #
          # # Verify patchelf didn't corrupt the dynamic section
          # READELF_OUT="$("$TC/bin/llvm-readelf" -d node 2>&1)"
          # if echo "$READELF_OUT" | grep -qi "goes past the end"; then
          #   echo "::error::patchelf left corrupted DT_STRSZ"
          #   echo "$READELF_OUT"; exit 1
          # fi
          # if ! echo "$READELF_OUT" | grep -qE '\(GNU_HASH\)|\(HASH\)'; then
          #   echo "::error::missing hash table after patchelf"
          #   echo "$READELF_OUT"; exit 1
          # fi
          #
          # if "$TC/bin/llvm-readelf" -d node | grep -q 'NEEDED.*libc++_shared'; then
          #   cp node libc++_shared.so "$STAGE_DIR/"   # STAGE_DIR set up below in this same step under Option 1
          # else
          #   cp node "$STAGE_DIR/"
          # fi
          # ============================================================

      # ---------- 5b. Stage combined per-ABI directory (binary + libc++ + headers) ----------
      # One directory holds everything this ABI ships — the previous
      # separate "Package Node.js headers" step wrote to an unrelated
      # node-headers/ folder that fed its own upload-artifact call; now
      # everything lands in STAGE_DIR so a single upload-artifact call
      # (6a below) produces one self-contained artifact per ABI.
      - name: Stage combined per-ABI directory
        if: success()
        working-directory: node
        run: |
          STAGE_DIR="../${LIB_NAME}-v${RESOLVED_NODE_VERSION}-android-${{ matrix.abi }}"
          mkdir -p "$STAGE_DIR"

          cp node "$STAGE_DIR/node"
          chmod +x "$STAGE_DIR/node"
          cp libc++_shared.so "$STAGE_DIR/libc++_shared.so"

          # Each ABI gets its own headers, NOT merged across ABIs. Reason:
          # config.gypi is generated by ./configure per-leg and its
          # contents differ per ABI (target_arch, byteorder, etc). Using
          # arm64-v8a headers to compile native addons against an
          # armeabi-v7a runtime (or vice versa) produces wrong config.gypi
          # and can cause addon build failures or ABI mismatch on device.
          #
          # Layout include/node/*.h follows the official
          # node-vX.Y.Z-headers.tar.gz structure from nodejs.org — this is
          # what node-gyp/node-addon-api reads via `npm config set
          # nodedir=...` when compiling native modules: Node's own public
          # headers plus all of V8's + libuv's includes. Bundled
          # OpenSSL/zlib headers are intentionally NOT packaged here.
          HDR_DIR="$STAGE_DIR/include/node"
          mkdir -p "$HDR_DIR"
          cp common.gypi "$HDR_DIR/"
          cp config.gypi "$HDR_DIR/"
          cp src/*.h "$HDR_DIR/"
          cp -r deps/v8/include/. "$HDR_DIR/"
          cp -r deps/uv/include/. "$HDR_DIR/"

          echo "---- Staged contents for ${{ matrix.abi }} ----"
          find "$STAGE_DIR" -maxdepth 2
          echo "---- Header count ----"
          find "$HDR_DIR" -name "*.h" | wc -l
          grep -E "target_arch|byteorder" "$HDR_DIR/config.gypi"

      # ---------- 6a. Upload combined artifact ----------
      # FIXED 2026-07-23: previously this and "Upload headers artifact"
      # below were two separate upload-artifact calls — binary+libc++ in
      # one artifact, headers in another — which meant every ABI's release
      # asset ended up as two separate downloads (a .tar.gz and a
      # .zip). The build job's "Stage combined per-ABI directory" step
      # (section 5b above) now puts node, libc++_shared.so, and the full
      # headers tree into one STAGE_DIR, so this single upload-artifact
      # call is enough — one self-contained artifact per ABI, which the
      # release job's "Assemble release archives" zips whole into one
      # release asset per ABI (binary + libc++_shared.so + headers
      # together, not separated).
      - name: Upload combined artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LIB_NAME }}-v${{ env.RESOLVED_NODE_VERSION }}-android-${{ matrix.abi }}
          path: ${{ env.LIB_NAME }}-v${{ env.RESOLVED_NODE_VERSION }}-android-${{ matrix.abi }}
          retention-days: 14

  # ---------- Release ----------
  release:
    name: Create GitHub Release
    needs: build
    if: success()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Resolve inputs
        env:
          NODE_VERSION_CHOICE: ${{ inputs.node_version || 'v24.x' }}
          CUSTOM_REF_RAW: ${{ inputs.custom_ref }}
          LIB_NAME_RAW: ${{ inputs.lib_name || 'node' }}
        run: |
          REQ="$NODE_VERSION_CHOICE"
          if [ "$REQ" = "custom" ]; then REQ="$CUSTOM_REF_RAW"; fi
          test -n "$REQ" || REQ="v24.x"
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="$LIB_NAME_RAW"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            SAFE_REF="$(echo "$REQ" | tr -c 'A-Za-z0-9_.-' '-')"
            echo "RELEASE_TAG=${NAME}-android-${SAFE_REF}-run${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      # merge-multiple: false (the default) on purpose here — arm64-v8a and
      # armeabi-v7a both upload a file literally named `node` (and, now,
      # `libc++_shared.so`). Merging would flatten both ABIs into one dist/
      # dir and one would silently clobber the other. Keeping per-artifact
      # subdirectories (dist/<artifact-name>/...) is what lets the next step
      # tell them apart.
      - name: Download all ABI artifacts
        uses: actions/download-artifact@v6
        with:
          # Wildcard now sits between LIB_NAME and "android" too, not just
          # at the end — build-job artifact names changed from
          # "${LIB_NAME}-android-<abi>" to
          # "${LIB_NAME}-v<resolved-version>-android-<abi>" (see section 3a
          # and 6a/6b in the build job) so a version is visible in the
          # artifact name itself. actions/download-artifact's `pattern`
          # uses Minimatch, which matches `*` anywhere in the string, not
          # only as a trailing glob, so this still matches every ABI/
          # headers artifact regardless of which resolved version ended up
          # in the name.
          pattern: ${{ env.LIB_NAME }}-v*-android-*
          path: dist
          if-no-artifact-found: warn

      - name: List downloaded artifacts
        run: ls -lhR dist || echo "::warning::no artifacts downloaded — did every matrix leg fail?"

      # ---------- Parse resolved Node.js version back out of artifact folder names ----------
      # This job never clones Node.js itself (it only downloads finished
      # artifacts from the build job), so it has no direct access to
      # src/node_version.h to resolve the version the way section 3a does
      # in the build job. Rather than plumb RESOLVED_NODE_VERSION across
      # jobs/matrix legs (the existing comment above already explains why
      # merge-multiple stays false for this exact race-condition-adjacent
      # reason with matrix legs), parse it back out of a downloaded
      # artifact's own folder name — merge-multiple: false means each
      # artifact lands in dist/<artifact-name>/, and that name is exactly
      # what the build job's Upload artifact step set, version and all —
      # so this is just reading it back rather than re-deriving it from
      # scratch.
      - name: Parse resolved Node.js version from artifact folder names
        run: |
          SAMPLE="$(ls dist | grep -m1 -E "^${LIB_NAME}-v[0-9]+\.[0-9]+\.[0-9]+(-dev)?-android-" || true)"
          if [ -z "$SAMPLE" ]; then
            echo "::warning::no artifact folder name matched the expected version pattern — falling back to NODE_REF for release notes"
            echo "RESOLVED_NODE_VERSION=${NODE_REF}" >> "$GITHUB_ENV"
          else
            VERSION="$(echo "$SAMPLE" | sed -E "s/^${LIB_NAME}-v([0-9]+\.[0-9]+\.[0-9]+(-dev)?)-android-.*/\1/")"
            echo "RESOLVED_NODE_VERSION=${VERSION}" >> "$GITHUB_ENV"
            echo "Resolved Node.js version from artifact: $VERSION"
          fi

      # actions/upload-artifact does not preserve Unix file permissions —
      # confirmed in its own docs/known issue (actions/upload-artifact#38,
      # open since 2019): every file lands as mode 644 after a
      # zipped-artifact round trip, regardless of what it was chmod'd to
      # before upload. The build job's "Package node" step verifies node
      # has no dynamic libc++_shared.so dependency and a valid ELF hash
      # table, but none of that survives as "executable" through
      # upload/download — node would extract from the release zip
      # non-executable otherwise, silently, since a 644 ELF file still
      # opens and inspects fine; it only fails the moment someone tries to
      # run it. Restore the bit explicitly, once, right after download,
      # before this ABI's directory gets zipped into a release asset.
      - name: Restore executable permission on node binaries
        run: |
          shopt -s nullglob
          for f in dist/*/node; do
            chmod +x "$f"
          done
          echo "---- Verifying ----"
          for f in dist/*/node; do
            ls -l "$f"
          done

      # This is the only place any archive gets made for actual distribution
      # — once, here. The build job intentionally uploads a raw directory
      # (section 6a) instead of pre-archiving, to avoid a zip-of-a-zip on
      # the Actions-artifact download path (upload-artifact always wraps
      # whatever it's given in one zip for UI download).
      #
      # FIXED 2026-07-23: this used to branch on a "*-headers" suffix,
      # zipping header artifacts and tar.gz-ing binary artifacts
      # separately — a leftover from when binary+libc++ and headers were
      # two separate artifacts per ABI. Now that the build job uploads
      # exactly one self-contained artifact per ABI (node + libc++_shared.so
      # + headers together — see "Stage combined per-ABI directory" and
      # "Upload combined artifact" above), there's no "*-headers" name left
      # to branch on, and no reason to treat any artifact differently from
      # any other: every dist/<artifact-name>/ directory is one ABI's
      # complete payload, so every one just gets zipped the same way into
      # one release asset.
      - name: Assemble release archives
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          for d in dist/*/; do
            name="$(basename "$d")"
            ( cd "$d" && zip -rq "$GITHUB_WORKSPACE/release-assets/${name}.zip" . )
          done
          ls -lh release-assets || echo "::warning::release-assets is empty — did every matrix leg fail?"

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          # Title now leads with the resolved version (e.g. "24.18.1-dev")
          # instead of echoing NODE_REF (e.g. "v24.x") verbatim — NODE_REF
          # is a moving branch on the default dropdown choices, so it never
          # told you which actual release ended up in this build. See
          # section 3a in the build job and the version-parsing step above
          # for where RESOLVED_NODE_VERSION comes from.
          name: "${{ env.LIB_NAME }} — Node ${{ env.RESOLVED_NODE_VERSION }} for Android (build #${{ github.run_number }})"
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            **Automated Android build**

            | | |
            |---|---|
            | Node.js version | `${{ env.RESOLVED_NODE_VERSION }}` |
            | Requested ref | `${{ env.NODE_REF }}` |
            | Artifact label | `${{ env.LIB_NAME }}` |
            | Build profile | `${{ inputs.profile || 'balanced' }}` |
            | NDK version | `${{ env.NDK_VERSION }}` |
            | Trigger | `${{ github.event_name }}` |
            | Commit | `${{ github.sha }}` |

            "Requested ref" is the branch/tag/custom ref that was asked for
            (e.g. `v24.x`, which is a moving branch, not a fixed version) —
            "Node.js version" above is what that ref actually resolved to
            for this specific build, read from src/node_version.h right
            after clone. A `-dev` suffix means this commit is not itself a
            tagged Node.js release, just wherever its release branch
            currently sits. Both the release title and every asset filename
            below carry this resolved version, not the requested ref.

            arm64-v8a is always included when the build succeeds; armeabi-v7a
            is experimental and only present below if that leg also succeeded.

            Each `${{ env.LIB_NAME }}-v${{ env.RESOLVED_NODE_VERSION }}-android-<abi>.zip`
            contains everything needed for that ABI in one download — the
            binary, its runtime companion library, and headers for
            compiling native addons against it:
            - `node` — single ELF, PIE, fully static (no NEEDED
              libc++_shared.so), all symbols exported via
              -rdynamic/--export-dynamic. Rename it to lib*.so yourself
              downstream if your app needs Android to extract it with exec
              permissions.
            - `libc++_shared.so` — bundled alongside for native N-API
              addons that dlopen it at runtime. node itself does not load
              this file.
            - `include/node/` — Node's public headers, all of V8's and
              libuv's includes, and `config.gypi`, laid out the same way
              official `node-vX.Y.Z-headers.tar.gz` releases are, for
              `node-gyp`/`node-addon-api` via `npm config set nodedir=...`.
              Use the zip matching your target ABI — `config.gypi` differs
              between arm64-v8a and armeabi-v7a, so mixing them produces a
              wrong native-addon build.
          files: release-assets/*
