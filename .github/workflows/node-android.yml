# .github/workflows/node-android.yml
# Cross-compiles Node.js for Android: arm64-v8a (verified) + armeabi-v7a (experimental,
# see nodejs/node#58975). Produces per ABI: satu file node (ELF PIE, semua symbol
# Node/V8 diexport lewat -rdynamic/--export-dynamic; tidak ada libnode.so terpisah).
#
# Downstream consumer: AuroraChat-Android (see AGENTS.MD). That project's
# AuroraNodeBridgePlugin spawns the `node` binary as a raw subprocess
# (ProcessBuilder), renamed to jniLibs/arm64-v8a/libaurora_node.so purely so
# Android's APK installer extracts it with executable permissions — it is
# NOT loaded via System.loadLibrary()/dlopen. This matters for packaging
# (see the libc++_shared.so + $ORIGIN rpath step below): a raw-exec'd child
# process does not automatically inherit the app's nativeLibraryDir search
# path the way a dlopen'd library would, so every runtime dependency of
# `node` must either be statically linked or discoverable via an rpath
# baked into the binary itself.
name: Node.js for Android (ARM)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build'
        type: choice
        default: 'v24.x'
        options:
          # Verified 2026-07-18 against nodejs.org release posts: v24.x is Active LTS
          # ("Krypton"), v26.x is Current (entered the Current slot 2026-05-05, becomes
          # LTS 2026-10). Note for later: starting with v27 in Oct 2026, Node moves to one
          # major/year and every release becomes LTS, so this odd/even split goes away —
          # this dropdown will want a straight version-number entry instead of a
          # LTS-vs-latest pairing once that lands. 'custom' already covers it in the
          # meantime via any branch/tag ref.
          - 'v24.x'       # LTS (Krypton)
          - 'v26.x'       # Current (not yet LTS)
          - 'custom'
      custom_ref:
        description: 'Custom git ref — only used when "custom" is selected'
        required: false
        default: ''
      lib_name:
        description: 'Label for this build — used only in the artifact/tar.gz filename (e.g. "aurora" → aurora-android-<abi>.tar.gz). The binary inside stays named `node`; rename it to a lib*.so downstream if your app needs Android to extract it with exec permissions (see AGENTS.MD).'
        required: false
        default: 'node'
      profile:
        description: 'Build profile'
        type: choice
        default: 'balanced'
        options:
          - 'balanced'    # JIT + -O3: best runtime speed (Baileys/server use)
          - 'speed'       # + LTO: faster, much longer build
          - 'size'        # + v8-lite-mode: lower RAM, slower JS/crypto

# A from-scratch V8 cross-compile is expensive (this is not a fast job, especially
# under the `speed` profile's --enable-lto). Group by ref so a second push to the
# same branch/tag cancels the stale run instead of both burning CI minutes in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # r27d supersedes r27c within the same LTS line (bugfix-only bump, not a track
  # change) — verified against developer.android.com/ndk/downloads on 2026-07-18,
  # where r27d is listed as "Latest LTS Version". r29 is the current non-LTS
  # "Latest Stable"; r30 (beta1 as of this check) will be the *next* LTS. Staying on
  # the LTS point release here rather than jumping to r29/r30 to match this
  # workflow's existing LTS-track choice — bump deliberately, not by drive-by.
  NDK_VERSION: 'r27d'
  MIN_API: '24'                # Node v24+ requires API 24+ (Android 7.0). Do NOT set below 24.
  ANDROID_PLATFORM: 'android-24'

jobs:
  build:
    name: android-${{ matrix.abi }}
    # Pinned instead of floating `ubuntu-latest`. GitHub rolled ubuntu-latest onto a
    # new default image 2026-06-08→06-15 (24.04 → 26.04, per actions/runner-images —
    # verified 2026-07-18, i.e. that migration is already behind us or finishing right
    # about now), following the same 22.04→24.04 pattern from late 2024/early 2025.
    # GitHub's own runner-images docs recommend pinning for exactly this reason. This
    # build is sensitive to the runner's default gcc/g++ and python3 versions (see the
    # GCC-specific turboshaft-Tuple patch below, and the Python >=3.10 check in the
    # host-tools step) and to gcc-multilib/g++-multilib packaging for the armeabi-v7a
    # leg — not things that should shift under this workflow on a random day because
    # GitHub silently repointed a floating label. Bump this deliberately when ready to
    # validate the new image, rather than inheriting it automatically.
    runs-on: ubuntu-24.04
    # armeabi-v7a is best-effort: upstream V8 cross-build for 32-bit targets on
    # x64 hosts has open bugs (nodejs/node#58975). Never let it block arm64.
    continue-on-error: ${{ matrix.experimental || false }}
    # From-scratch V8+Node cross-compile; --enable-lto (speed profile) especially can
    # run long. Without this, a genuine hang rides the GH Actions default of 360
    # minutes before anything stops it. 180 is generous headroom over normal runs
    # (including LTO) without leaving the job free to run indefinitely.
    timeout-minutes: 180
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a            # 64-bit ARM — verified working
            dest_cpu: arm64
            target: aarch64-linux-android
          - abi: armeabi-v7a          # 32-bit ARM — experimental
            dest_cpu: arm
            target: armv7a-linux-androideabi
            experimental: true

    steps:
      # ---------- 0. Resolve inputs ----------
      # SECURITY: custom_ref and lib_name are free-text workflow_dispatch inputs. They
      # are passed in via `env:` and read as shell variables ($CUSTOM_REF_RAW etc.)
      # below, NOT interpolated as ${{ }} inside the script body. Splicing free text
      # straight into a run: block lets shell metacharacters in the input execute as
      # part of the script itself, before the regex validation a few lines down ever
      # runs — this is GitHub's own documented script-injection class (see "Script
      # injections" / "Security hardening for GitHub Actions" in the Actions docs;
      # the `env:` intermediate-variable pattern is their recommended fix). Given this
      # job also holds `permissions: contents: write`, a successful injection here
      # could push content or forge a release, not just leak a token. node_version and
      # profile don't need this treatment — they're `type: choice`, so GitHub itself
      # restricts them to the listed options before this step ever runs.
      - name: Resolve inputs
        env:
          NODE_VERSION_CHOICE: ${{ inputs.node_version || 'v24.x' }}
          CUSTOM_REF_RAW: ${{ inputs.custom_ref }}
          LIB_NAME_RAW: ${{ inputs.lib_name || 'node' }}
        run: |
          REQ="$NODE_VERSION_CHOICE"
          if [ "$REQ" = "custom" ]; then REQ="$CUSTOM_REF_RAW"; fi
          test -n "$REQ" || { echo "::error::custom_ref is empty"; exit 1; }
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="$LIB_NAME_RAW"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          if ! [[ "$NAME" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "::error::Invalid lib_name '$NAME'"; exit 1
          fi
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Building Node.js '$REQ' — artifact label: $NAME (binary itself stays named 'node')"

      # ---------- 1. Android NDK ----------
      # @v1 is a floating major tag; it already resolves to 1.5.0 (current as of
      # 2026-07-18) so no change needed here. If you want to harden against the tag
      # being repointed later (this job holds contents: write), pin to the release
      # commit SHA instead of @v1 — GitHub's own actions-hardening guidance recommends
      # this for third-party actions generally.
      - name: Set up Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Verify NDK toolchain paths
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-$ANDROID_NDK}" >> "$GITHUB_ENV"
          TC="${ANDROID_NDK_HOME:-$ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          test -x "$TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"

      # ---------- 1b. ccache ----------
      # Everything above this point is seconds; the ~2h this job takes is almost
      # entirely the make step in section 4 — a from-scratch V8+Node compile with
      # no object reuse between runs. ccache fixes that: it caches compiled objects
      # by actual preprocessed source+flags content, so reruns/retries and
      # iterating on this workflow (not on Node's own source) get much faster once
      # warm. A brand-new Node ref/ABI/profile combo still pays the full build time
      # on its first run — the win is every run after that.
      - name: Configure ccache
        run: |
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=2G" >> "$GITHUB_ENV"

      - name: Cache ccache directory
        # @v5 verified current 2026-07-18 (runs on Node 24, needs Actions Runner
        # >=2.327.1 — both already satisfied by the ubuntu-24.04 hosted runner).
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          # run_id in the primary key means this always saves (so the cache keeps
          # accumulating objects run over run); restore-keys prefix-matches the
          # most recent cache for this abi+ref+profile combo regardless of run_id.
          key: ccache-${{ matrix.abi }}-${{ env.NODE_REF }}-${{ inputs.profile || 'balanced' }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.abi }}-${{ env.NODE_REF }}-${{ inputs.profile || 'balanced' }}-

      # ---------- 2. Host build tools ----------
      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 g++ make git ca-certificates ccache curl

          # Node.js 26.x dropped support for building from source with Python < 3.10
          # (verified against the "What's new in Node.js 26" release notes, 2026-07-18).
          # ubuntu-24.04's default python3 (3.12) already clears this, but fail with a
          # clear message here rather than an opaque gyp/python error after the build
          # has already been running for a while — this matters more once someone points
          # node_version at v26.x or a custom v26+ ref.
          PYVER="$(python3 -c 'import sys; print("%d.%d" % sys.version_info[:2])')"
          python3 -c 'import sys; sys.exit(0 if sys.version_info[:2] >= (3, 10) else 1)' \
            || { echo "::error::python3 is $PYVER, but Node >=26 needs >=3.10 to build from source"; exit 1; }
          echo "python3 $PYVER OK"

      # ---------- 2b. patchelf (pinned upstream release, NOT apt) ----------
      # NOTE: Only required if you switch to OPTION 2 below (bundled libc++_shared.so).
      # For the default fully-static build this tool is installed but unused.
      - name: Install patchelf (latest upstream release, pinned per-run)
        run: |
          LATEST_URL="$(curl -fsSL -o /dev/null -w '%{url_effective}' \
            https://github.com/NixOS/patchelf/releases/latest)"
          PATCHELF_VERSION="${LATEST_URL##*/}"
          echo "Resolved NixOS/patchelf latest release: $PATCHELF_VERSION"
          if ! [[ "$PATCHELF_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Could not resolve a valid patchelf version from /releases/latest (got '$PATCHELF_VERSION'). Refusing to silently fall back to a possibly-buggy version — fix this step or pin PATCHELF_VERSION manually."
            exit 1
          fi

          ASSET="patchelf-${PATCHELF_VERSION}-x86_64.tar.gz"
          ASSET_URL="https://github.com/NixOS/patchelf/releases/download/${PATCHELF_VERSION}/${ASSET}"
          curl -fsSL -o /tmp/patchelf.tar.gz "$ASSET_URL"
          mkdir -p /tmp/patchelf-extracted
          tar xzf /tmp/patchelf.tar.gz -C /tmp/patchelf-extracted
          sudo install -m 0755 /tmp/patchelf-extracted/bin/patchelf /usr/local/bin/patchelf
          hash -r

          echo "---- patchelf version in use ----"
          patchelf --version
          RESOLVED="$(command -v patchelf)"
          echo "Resolved patchelf binary: $RESOLVED"
          [ "$RESOLVED" = "/usr/local/bin/patchelf" ] \
            || { echo "::error::patchelf resolved to '$RESOLVED', not /usr/local/bin/patchelf — PATH ordering issue, apt's older copy would silently win"; exit 1; }

      - name: Install 32-bit multilib (armeabi-v7a only)
        if: matrix.dest_cpu == 'arm'
        run: sudo apt-get install -y gcc-multilib g++-multilib
        # V8 mandates 32-bit host tools when targeting 32-bit arm.

      # ---------- 3. Node.js source ----------
      - name: Clone Node.js (${{ env.NODE_REF }})
        run: git clone --depth 1 --branch "$NODE_REF" https://github.com/nodejs/node.git node

      # ---------- 3b. Patch known Android cross-build issues ----------
      # Android is not an officially tested/supported Node.js target (core team
      # position, see nodejs/node#58505) — these are community-tracked issues
      # carried by Termux's Node.js packaging for years and partially upstreamed.
      # Expect this list to need revisiting on every Node major bump.
      - name: Patch V8 for Android cross-build
        working-directory: node
        run: |
          python3 - <<'PYEOF' 2>&1 | tee /tmp/android-patch.log
          import pathlib
          import textwrap

          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping — may be version-specific)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path} (maybe already fixed upstream)")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          patch('deps/v8/src/base/debug/stack_trace_posix.cc',
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"',
                '#if defined(__ANDROID__)\n'
                'extern "C" int backtrace(void**, int) { return 0; }\n'
                'extern "C" char** backtrace_symbols(void* const*, int) { return nullptr; }\n'
                'extern "C" void backtrace_symbols_fd(void* const*, int, int) {}\n'
                '#endif\n\n'
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"')

          patch('deps/v8/src/base/small-vector.h',
                '  ASSERT_TRIVIALLY_COPYABLE(T);',
                '  // ASSERT_TRIVIALLY_COPYABLE(T);  // android xbuild: nodejs/node#58975')

          patch('deps/v8/src/trap-handler/trap-handler.h',
                textwrap.dedent('''\
                    // X64 on Linux, Windows, MacOS, FreeBSD.
                    #if V8_HOST_ARCH_X64 && V8_TARGET_ARCH_X64 &&                        \\
                        ((V8_OS_LINUX && !V8_OS_ANDROID) || V8_OS_WIN || V8_OS_DARWIN || \\
                         V8_OS_FREEBSD)
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Arm64 (non-simulator) on Linux, Windows, MacOS.
                    #elif V8_TARGET_ARCH_ARM64 && V8_HOST_ARCH_ARM64 && \\
                        ((V8_OS_LINUX && !V8_OS_ANDROID) || V8_OS_WIN || V8_OS_DARWIN)
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Arm64 simulator on x64 on Linux, Mac, or Windows.
                    //
                    // The simulator case uses some inline assembly code, which cannot be
                    // compiled with MSVC, so don't enable the trap handler in that case.
                    // (MSVC #defines _MSC_VER, but so does Clang when targeting Windows, hence
                    // the check for __clang__.)
                    #elif V8_TARGET_ARCH_ARM64 && V8_HOST_ARCH_X64 && \\
                        (V8_OS_LINUX || V8_OS_DARWIN || V8_OS_WIN) && \\
                        (!defined(_MSC_VER) || defined(__clang__))
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Loong64 (non-simulator) on Linux.
                    #elif V8_TARGET_ARCH_LOONG64 && V8_HOST_ARCH_LOONG64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Loong64 simulator on x64 on Linux
                    #elif V8_TARGET_ARCH_LOONG64 && V8_HOST_ARCH_X64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // RISCV64 (non-simulator) on Linux.
                    #elif V8_TARGET_ARCH_RISCV64 && V8_HOST_ARCH_RISCV64 && V8_OS_LINUX && \\
                        !V8_OS_ANDROID
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // RISCV64 simulator on x64 on Linux
                    #elif V8_TARGET_ARCH_RISCV64 && V8_HOST_ARCH_X64 && V8_OS_LINUX
                    #define V8_TRAP_HANDLER_VIA_SIMULATOR
                    #define V8_TRAP_HANDLER_SUPPORTED true
                    // Everything else is unsupported.
                    #else
                    #define V8_TRAP_HANDLER_SUPPORTED false
                    #endif'''),
                '#define V8_TRAP_HANDLER_SUPPORTED false')

          patch('deps/uv/uv.gyp',
                '\n'.join([
                    "      'target_name': 'libuv',",
                    "      'toolsets': ['host', 'target'],",
                    "      'type': '<(uv_library)',",
                    "      'include_dirs': [",
                    "        'include',",
                    "        'src/',",
                    "      ],",
                ]),
                '\n'.join([
                    "      'target_name': 'libuv',",
                    "      'toolsets': ['host', 'target'],",
                    "      'type': '<(uv_library)',",
                    "      'include_dirs+': [",
                    "        'include',",
                    "        'src/',",
                    "      ],",
                ]))

          patch('deps/uv/uv.gyp',
                "        'include_dirs': [ 'include' ],",
                "        'include_dirs+': [ 'include' ],")

          patch('deps/uv/src/unix/fs.c',
                textwrap.dedent("""\
                    #ifdef FICLONE
                      if (req->flags & UV_FS_COPYFILE_FICLONE ||
                          req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {"""),
                textwrap.dedent("""\
                    #ifndef __ANDROID__
                    #ifdef FICLONE
                      if (req->flags & UV_FS_COPYFILE_FICLONE ||
                          req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {"""))

          patch('test/cctest/test_crypto_clienthello.cc',
                "    alloc_base = static_cast<uint8_t*>(aligned_alloc(page, 2 * page));",
                "    CHECK_EQ(posix_memalign(reinterpret_cast<void**>(&alloc_base), page, 2 * page), 0);")

          v8config_h = pathlib.Path('deps/v8/include/v8config.h')
          s = v8config_h.read_text()
          old_atomic_line = '#include <memory>'
          new_polyfill_block = (
              '#include <memory>\n'
              '#if defined(__ANDROID__) && !defined(__cpp_lib_atomic_ref)\n'
              '#ifndef V8_STD_ATOMIC_REF_POLYFILL\n'
              '#define V8_STD_ATOMIC_REF_POLYFILL\n'
              'namespace std {\n'
              'template <typename T>\n'
              'struct atomic_ref {\n'
              '  explicit atomic_ref(T& obj) : ptr_(&obj) {}\n'
              '  void store(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    __atomic_store_n(ptr_, val, static_cast<int>(order)); }\n'
              '  T load(memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_load_n(ptr_, static_cast<int>(order)); }\n'
              '  T exchange(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_exchange_n(ptr_, val, static_cast<int>(order)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order success, memory_order failure) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(success), static_cast<int>(failure)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(order), static_cast<int>(order)); }\n'
              '  T fetch_add(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_add(ptr_, val, static_cast<int>(order)); }\n'
              '  T fetch_or(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_or(ptr_, val, static_cast<int>(order)); }\n'
              'private:\n'
              '  T* ptr_;\n'
              '};\n'
              '}  // namespace std\n'
              '#endif\n'
              '#endif')
          if old_atomic_line in s:
              s = s.replace(old_atomic_line, new_polyfill_block, 1)
              v8config_h.write_text(s)
              print("patched deps/v8/include/v8config.h (std::atomic_ref polyfill)")
          else:
              print("::warning::could not find '#include <memory>' in v8config.h")

          patch('deps/v8/src/base/memcopy.h',
                '    std::atomic_ref<T>(destination[i]).store(value, std::memory_order_relaxed);',
                '    __atomic_store_n(&destination[i], value, __ATOMIC_RELAXED);')

          reducer_h = pathlib.Path('deps/v8/src/compiler/turboshaft/int64-lowering-reducer.h')
          s = reducer_h.read_text()
          old_tuple_call = 'return __ Tuple<Word32, Word32>(result, __ Word32Constant(0));'
          count = s.count(old_tuple_call)
          if count == 0:
              print("::warning::could not find explicit-template Tuple<Word32,Word32> call in int64-lowering-reducer.h (maybe already fixed upstream)")
          else:
              s = s.replace(old_tuple_call, 'return __ template Tuple<Word32, Word32>(result, __ Word32Constant(0));')
              reducer_h.write_text(s)
              print(f"patched deps/v8/src/compiler/turboshaft/int64-lowering-reducer.h ({count} occurrence(s) of explicit-template Tuple call)")

          zlib_c = pathlib.Path('deps/zlib/cpu_features.c')
          s = zlib_c.read_text()
          old_incl = (
              '#if defined(ARMV8_OS_ANDROID)\n'
              '#include <cpu-features.h>\n'
              '#elif defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          new_incl = (
              '#if defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          if old_incl in s:
              s = s.replace(old_incl, new_incl, 1)
              print("patched deps/zlib/cpu_features.c (includes)")
          else:
              print("::warning::could not find Android/Linux include block in cpu_features.c")

          old_aarch64 = (
              '#if defined(ARMV8_OS_ANDROID) && defined(__aarch64__)\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM64_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM64_FEATURE_PMULL);')
          new_aarch64 = (
              '#if (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && defined(__aarch64__)\n'
              '    unsigned long features = getauxval(AT_HWCAP);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP_PMULL);')
          if old_aarch64 in s:
              s = s.replace(old_aarch64, new_aarch64, 1)
              print("patched deps/zlib/cpu_features.c (aarch64)")
          else:
              print("::warning::could not find Android aarch64 branch in cpu_features.c")

          old_aarch32 = (
              '#elif defined(ARMV8_OS_ANDROID) /* aarch32 */\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM_FEATURE_PMULL);')
          new_aarch32 = (
              '#elif (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && (defined(__ARM_NEON) || defined(__ARM_NEON__))\n'
              '    unsigned long features = getauxval(AT_HWCAP2);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP2_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP2_PMULL);')
          if old_aarch32 in s:
              s = s.replace(old_aarch32, new_aarch32, 1)
              print("patched deps/zlib/cpu_features.c (aarch32)")
          else:
              print("::warning::could not find Android aarch32 branch in cpu_features.c")
          zlib_c.write_text(s)

          fs_c = pathlib.Path('deps/uv/src/unix/fs.c')
          s = fs_c.read_text()
          old_close = '\n'.join([
              '    goto out;',
              '  }',
              '#endif',
              '',
              '  bytes_to_send = src_statsbuf.st_size;',
          ])
          new_close = '\n'.join([
              '    goto out;',
              '  }',
              '#endif',
              '#endif',
              '',
              '  bytes_to_send = src_statsbuf.st_size;',
          ])
          if old_close not in s:
              print("::warning::context not found for FICLONE #endif close in deps/uv/src/unix/fs.c")
          else:
              fs_c.write_text(s.replace(old_close, new_close, 1))
              print("closed #ifndef __ANDROID__ block in deps/uv/src/unix/fs.c")
          PYEOF

          echo "Skipped from Termux's nodejs-lts patch set (reviewed, not applicable to a non-Termux NDK cross-build):"
          echo "  - common.gypi.patch: removes an OS==\"android\" cflags/ldflags stanza tied to"
          echo "    Termux's own android_ndk_path/cpufeatures usage."
          echo "  - deps-uv-src-unix-core.c.patch, deps-v8-src-flags-flag-definitions.h.patch:"
          echo "    swap /data/local/tmp for a literal @TERMUX_PREFIX@/tmp placeholder."
          echo "  - deps-uvwasi-src-uvwasi.c.patch: re-enables WASI readdir support on Android,"
          echo "    relying on Termux's libc environment."
          echo "  - deps-uv-src-unix-process.c.patch: strips post-fork privilege-drop calls."

          FAILED_PATCHES="$(grep -c '::warning::' /tmp/android-patch.log || true)"
          if [ "${FAILED_PATCHES:-0}" -gt 0 ]; then
            echo "::warning::$FAILED_PATCHES Android patch attempt(s) above did not apply cleanly — see the ::warning:: lines above."
          else
            echo "All expected Android patches applied cleanly."
          fi

      # ---------- 4. Cross-compile ----------
      - name: Cross-compile Node.js for ${{ matrix.abi }}
        working-directory: node
        run: |
          export TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"

          # Target toolchain (API level via wrapper suffix == -DANDROID_PLATFORM=android-24)
          export CC="ccache $TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"
          export CXX="ccache $TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang++"
          # Static-link libc++ -> 1 file output, no libc++_shared.so needed
          export CXXFLAGS="$CXXFLAGS -static-libstdc++"
          # FIX: old workflow had a second 'export LDFLAGS=...' that overwrote this,
          # silently discarding -static-libstdc++. Merged into one line:
          export LDFLAGS="$LDFLAGS -static-libstdc++ -Wl,-z,max-page-size=16384 -rdynamic -Wl,--export-dynamic"
          export AR="$TC/bin/llvm-ar"
          export NM="$TC/bin/llvm-nm"
          export RANLIB="$TC/bin/llvm-ranlib"
          export STRIP="$TC/bin/llvm-strip"
          export READELF="$TC/bin/llvm-readelf"
          # NOTE: do NOT export LINK — gyp reads it for the HOST linker and breaks.

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CC_host="ccache gcc -m32"
            export CXX_host="ccache g++ -m32"
          else
            export CC_host="ccache gcc"
            export CXX_host="ccache g++"
          fi

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CFLAGS_host=-m32 CXXFLAGS_host=-m32 LDFLAGS_host=-m32
            HOST_ARCH_GYP="ia32"
          else
            HOST_ARCH_GYP="x64"
          fi

          export GYP_DEFINES="OS=android host_os=linux target_arch=${{ matrix.dest_cpu }} v8_target_arch=${{ matrix.dest_cpu }} android_target_arch=${{ matrix.dest_cpu }} android_ndk_path=${ANDROID_NDK_HOME} host_arch=$HOST_ARCH_GYP v8_host_arch=$HOST_ARCH_GYP"

          EXTRA_FLAGS=""
          case "${{ inputs.profile || 'balanced' }}" in
            speed) EXTRA_FLAGS="--enable-lto" ;;
            size)  EXTRA_FLAGS="--v8-lite-mode" ;;
          esac

          NODEEXTRA=""
          if ./configure --help 2>&1 | grep -q without-corepack; then
            NODEEXTRA="--without-corepack"
          fi

          ./configure \
            --cross-compiling \
            --dest-os=android \
            --dest-cpu=${{ matrix.dest_cpu }} \
            --with-intl=none \
            --without-npm \
            $NODEEXTRA \
            --openssl-no-asm \
            $EXTRA_FLAGS

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            make -j"$(nproc)" node CC.host="ccache gcc -m32" CXX.host="ccache g++ -m32" LINK.host="g++ -m32" AR.host=ar
          else
            make -j"$(nproc)" node CC.host="ccache gcc" CXX.host="ccache g++" LINK.host="g++" AR.host=ar
          fi

          echo "---- ccache stats (${{ matrix.abi }}) ----"
          ccache -s

      # ---------- 5. Rename, strip, package ----------
      # DEFAULT (Option 1): Fully static single binary — zero bundled .so files.
      # OPTION 2 (commented below): Bundle libc++_shared.so + bake $ORIGIN rpath.
      - name: Package node (fully static single binary)
        if: success()
        working-directory: node
        run: |
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          echo "Directory structure under out/Release:"
          find out/Release -maxdepth 3 -type d

          if [ ! -f "out/Release/node" ]; then
            echo "::error::out/Release/node not found — build step may have failed"
            exit 1
          fi

          "$TC/bin/llvm-readelf" -h "out/Release/node" | grep -E 'Class|Machine|Type'

          if [ ! -e node ] || [ "$(readlink -f out/Release/node)" != "$(readlink -f node)" ]; then
            cp out/Release/node node
          else
            echo "out/Release/node and node are already the same file, skipping copy"
          fi

          # --export-dynamic marks symbols via .dynsym, so strip-all is safe.
          "$TC/bin/llvm-strip" --strip-all node

          echo "---- ELF type check ----"
          "$TC/bin/llvm-readelf" -h node | grep -E 'Class|Machine|Type'
          echo "---- Exported dynamic symbol count ----"
          "$TC/bin/llvm-readelf" --dyn-syms node | wc -l

          # ---- HARD CHECK: libc++ must be statically linked ----
          echo "---- NEEDED entries (must NOT contain libc++_shared.so) ----"
          NEEDED="$("$TC/bin/llvm-readelf" -d node | grep NEEDED || true)"
          echo "$NEEDED"

          if echo "$NEEDED" | grep -q 'libc++_shared'; then
            echo "::error::node still links dynamically against libc++_shared.so. The -static-libstdc++ flag did not take effect. Inspect the link command above."
            exit 1
          fi

          # ---- Verify ELF hash table is intact ----
          READELF_OUT="$("$TC/bin/llvm-readelf" -d node 2>&1)"
          if ! echo "$READELF_OUT" | grep -qE '\(GNU_HASH\)|\(HASH\)'; then
            echo "::error::'node' has neither DT_HASH nor DT_GNU_HASH — will fail to load on-device."
            echo "$READELF_OUT"
            exit 1
          fi

          # Package ONLY the single binary. Nothing else.
          tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" node
          ls -lh node "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"

          # ============================================================
          # OPTION 2 — COMMENTED FALLBACK (do NOT delete)
          # ------------------------------------------------------------
          # If a future Node ref breaks -static-libstdc++ propagation through
          # gyp and you need to ship libc++_shared.so again, comment out the
          # 15 lines above (from "cp out/Release/node node" through the tar
          # command) and uncomment the block below instead.
          # ------------------------------------------------------------
          # cp out/Release/node node
          # "$TC/bin/llvm-strip" --strip-all node
          #
          # # Sysroot triple remap for 32-bit ARM
          # case "${{ matrix.dest_cpu }}" in
          #   arm) SYSROOT_TRIPLE="arm-linux-androideabi" ;;
          #   *)   SYSROOT_TRIPLE="${{ matrix.target }}" ;;
          # esac
          # cp "$TC/sysroot/usr/lib/${SYSROOT_TRIPLE}/libc++_shared.so" .
          # patchelf --set-rpath '$ORIGIN' node
          #
          # # Verify patchelf didn't corrupt the dynamic section
          # READELF_OUT="$("$TC/bin/llvm-readelf" -d node 2>&1)"
          # if echo "$READELF_OUT" | grep -qi "goes past the end"; then
          #   echo "::error::patchelf left corrupted DT_STRSZ"
          #   echo "$READELF_OUT"; exit 1
          # fi
          # if ! echo "$READELF_OUT" | grep -qE '\(GNU_HASH\)|\(HASH\)'; then
          #   echo "::error::missing hash table after patchelf"
          #   echo "$READELF_OUT"; exit 1
          # fi
          #
          # if "$TC/bin/llvm-readelf" -d node | grep -q 'NEEDED.*libc++_shared'; then
          #   tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" node libc++_shared.so
          #   ls -lh node libc++_shared.so "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"
          # else
          #   tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" node
          #   ls -lh node "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"
          # fi
          # ============================================================

      # ---------- 5b. Package Node.js headers (native addon builds) ----------
      - name: Package Node.js headers (${{ matrix.abi }})
        if: success()
        working-directory: node
        run: |
          HDR_DIR="node-headers/include/node"
          mkdir -p "$HDR_DIR"

          cp common.gypi "$HDR_DIR/"
          cp config.gypi "$HDR_DIR/"
          cp src/*.h "$HDR_DIR/"
          cp -r deps/v8/include/. "$HDR_DIR/"
          cp -r deps/uv/include/. "$HDR_DIR/"

          echo "---- Isi header per ABI (${{ matrix.abi }}) ----"
          find "$HDR_DIR" -maxdepth 1 -name "*.h" | wc -l
          grep -E "target_arch|byteorder" "$HDR_DIR/config.gypi"

          cd node-headers
          zip -rq "../../${LIB_NAME}-android-${{ matrix.abi }}-headers.zip" include
          cd ..
          ls -lh "../${LIB_NAME}-android-${{ matrix.abi }}-headers.zip"

      # ---------- 6a. Upload artifact ----------
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}
          path: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}.tar.gz
          retention-days: 14

      # ---------- 6b. Upload headers artifact ----------
      - name: Upload headers artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}-headers
          path: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}-headers.zip
          retention-days: 14

  # ---------- Release ----------
  release:
    name: Create GitHub Release
    needs: build
    if: success()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Resolve inputs
        env:
          NODE_VERSION_CHOICE: ${{ inputs.node_version || 'v24.x' }}
          CUSTOM_REF_RAW: ${{ inputs.custom_ref }}
          LIB_NAME_RAW: ${{ inputs.lib_name || 'node' }}
        run: |
          REQ="$NODE_VERSION_CHOICE"
          if [ "$REQ" = "custom" ]; then REQ="$CUSTOM_REF_RAW"; fi
          test -n "$REQ" || REQ="v24.x"
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="$LIB_NAME_RAW"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            SAFE_REF="$(echo "$REQ" | tr -c 'A-Za-z0-9_.-' '-')"
            echo "RELEASE_TAG=${NAME}-android-${SAFE_REF}-run${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Download all ABI artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ env.LIB_NAME }}-android-*
          path: dist
          merge-multiple: true
          if-no-artifact-found: warn

      - name: List downloaded artifacts
        run: ls -lh dist || echo "::warning::no artifacts downloaded — did every matrix leg fail?"

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.LIB_NAME }} — Node ${{ env.NODE_REF }} for Android (build #${{ github.run_number }})"
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            **Automated Android build**

            | | |
            |---|---|
            | Node.js ref | `${{ env.NODE_REF }}` |
            | Artifact label | `${{ env.LIB_NAME }}` |
            | Build profile | `${{ inputs.profile || 'balanced' }}` |
            | NDK version | `${{ env.NDK_VERSION }}` |
            | Trigger | `${{ github.event_name }}` |
            | Commit | `${{ github.sha }}` |

            arm64-v8a is always included when the build succeeds; armeabi-v7a
            is experimental and only present below if that leg also succeeded.
            Binary inside each tar.gz is named `node` (single ELF, PIE, all
            symbols exported via -rdynamic/--export-dynamic) — rename it to
            lib*.so yourself downstream if your app needs Android to extract
            it with exec permissions.

            Each ABI also ships a `*-headers.zip` (Node.js includes +
            `config.gypi`) for compiling native N-API addons against that
            specific build. Use the headers matching the target ABI —
            `config.gypi` differs between arm64-v8a and armeabi-v7a.
          files: dist/*
