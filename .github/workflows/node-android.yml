# Cross-compiles Node.js for Android: arm64-v8a (verified) + armeabi-v7a (experimental,
# see nodejs/node#58975). Produces per ABI: lib<n>.so + node CLI binary.
name: Node.js for Android (ARM)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build'
        type: choice
        default: 'v26.x'
        options:
          - 'v26.x'       # Latest release line
          - 'v24.x'       # LTS (Krypton)
          - 'custom'
      custom_ref:
        description: 'Custom git ref — only used when "custom" is selected'
        required: false
        default: ''
      lib_name:
        description: 'Library name — output will be lib<n>.so (e.g. "aurora" → libaurora.so)'
        required: false
        default: 'node'
      profile:
        description: 'Build profile'
        type: choice
        default: 'balanced'
        options:
          - 'balanced'    # JIT + -O3: best runtime speed (Baileys/server use)
          - 'speed'       # + LTO: faster, much longer build
          - 'size'        # + v8-lite-mode: lower RAM, slower JS/crypto

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # NDK r29 (stable 29.0.14206865, Oct 2025). Ships LLVM clang-r563880c,
  # which is significantly newer than r27d's Clang 18. This resolves the
  # consteval/immediate-escalation bug (llvm-project#94935) and the
  # decltype(non-static-member) resolution gap that previously required
  # manual patches for r26d/r27d. 16 KiB page alignment is now the default
  # for arm64/x86_64 since r28, so the explicit -z,max-page-size flag is
  # redundant but harmless.
  NDK_VERSION: 'r29'
  MIN_API: '24'                # Node v24+ requires API 24+ (Android 7.0). Do NOT set below 24.
  ANDROID_PLATFORM: 'android-24'

jobs:
  build:
    name: android-${{ matrix.abi }}
    # ubuntu-24.04 ships GCC 13.2 as default gcc/g++. V8's current C++20
    # usage requires GCC 13.2+ (nodejs/node#62555).
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    # armeabi-v7a is best-effort: upstream V8 cross-build for 32-bit targets on
    # x64 hosts has open bugs (nodejs/node#58975). Never let it block arm64.
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a            # 64-bit ARM — verified working
            dest_cpu: arm64
            target: aarch64-linux-android
          - abi: armeabi-v7a          # 32-bit ARM — experimental
            dest_cpu: arm
            target: armv7a-linux-androideabi
            experimental: true

    steps:
      # ---------- 0. Resolve inputs ----------
      # SECURITY: custom_ref and lib_name are free-text workflow_dispatch inputs.
      # Read them through env: variables (resolved before the shell runs) instead of
      # ${{ }} inline interpolation to prevent shell-metacharacter injection.
      - name: Resolve inputs
        env:
          CUSTOM_REF_RAW: ${{ inputs.custom_ref || '' }}
          LIB_NAME_RAW: ${{ inputs.lib_name || 'node' }}
        run: |
          REQ="${{ inputs.node_version || 'v26.x' }}"
          if [ "$REQ" = "custom" ]; then REQ="$CUSTOM_REF_RAW"; fi
          if [ -z "$REQ" ]; then echo "::error::custom_ref is empty"; exit 1; fi
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="$LIB_NAME_RAW"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          if ! [[ "$NAME" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "::error::Invalid lib_name '$NAME'"; exit 1
          fi
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Building Node.js '$REQ' as lib$NAME.so"

      # ---------- 1. Android NDK (r29) ----------
      - name: Set up Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Verify NDK toolchain paths
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-$ANDROID_NDK}" >> "$GITHUB_ENV"
          TC="${ANDROID_NDK_HOME:-$ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          test -x "$TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"
          echo "NDK OK: ${ANDROID_NDK_HOME:-$ANDROID_NDK}"

      # ---------- 1b. ccache ----------
      - name: Configure ccache
        run: |
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=2G" >> "$GITHUB_ENV"

      - name: Cache ccache directory
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.abi }}-${{ env.NODE_REF }}-${{ inputs.profile || 'balanced' }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.abi }}-${{ env.NODE_REF }}-${{ inputs.profile || 'balanced' }}-

      # ---------- 2. Host build tools ----------
      - name: Install host build tools
        run: |
          python3 -c "import sys; v=sys.version_info; assert v>=(3,10), f'need Python>=3.10, got {v}'"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             python3 g++ make git ca-certificates ccache

      # ---------- 2b. patchelf (pinned upstream release, NOT apt) ----------
      # NOTE: Only required if you switch to OPTION 2 below (bundled libc++_shared.so).
      # For the default fully-static build this tool is installed but unused.
      - name: Install patchelf (latest upstream release, pinned per-run)
        run: |
          LATEST_URL="$(curl -fsSL -o /dev/null -w '%{url_effective}'             https://github.com/NixOS/patchelf/releases/latest)"
          PATCHELF_VERSION="${LATEST_URL##*/}"
          echo "Resolved NixOS/patchelf latest release: $PATCHELF_VERSION"
          if ! [[ "$PATCHELF_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Could not resolve a valid patchelf version from /releases/latest (got '$PATCHELF_VERSION'). Refusing to silently fall back to a possibly-buggy version — fix this step or pin PATCHELF_VERSION manually."
            exit 1
          fi

          ASSET="patchelf-${PATCHELF_VERSION}-x86_64.tar.gz"
          ASSET_URL="https://github.com/NixOS/patchelf/releases/download/${PATCHELF_VERSION}/${ASSET}"
          curl -fsSL -o /tmp/patchelf.tar.gz "$ASSET_URL"
          mkdir -p /tmp/patchelf-extracted
          tar xzf /tmp/patchelf.tar.gz -C /tmp/patchelf-extracted
          sudo install -m 0755 /tmp/patchelf-extracted/bin/patchelf /usr/local/bin/patchelf
          hash -r

          echo "---- patchelf version in use ----"
          patchelf --version
          RESOLVED="$(command -v patchelf)"
          echo "Resolved patchelf binary: $RESOLVED"
          [ "$RESOLVED" = "/usr/local/bin/patchelf" ]             || { echo "::error::patchelf resolved to '$RESOLVED', not /usr/local/bin/patchelf — PATH ordering issue, apt's older copy (if installed) would silently win"; exit 1; }

      - name: Install 32-bit multilib (armeabi-v7a only)
        if: matrix.dest_cpu == 'arm'
        run: sudo apt-get install -y gcc-multilib g++-multilib
        # V8 mandates 32-bit host tools when targeting 32-bit arm.

      # ---------- 3. Node.js source ----------
      - name: Clone Node.js (${{ env.NODE_REF }})
        run: git clone --depth 1 --branch "$NODE_REF" https://github.com/nodejs/node.git node

      # ---------- 3b. Patch known Android cross-build issues ----------
      # Android is not an officially tested/supported Node.js target (core team
      # position, see nodejs/node#58505) — these are community-tracked issues
      # carried by Termux's Node.js packaging for years and partially upstreamed.
      # Expect this list to need revisiting on every Node major bump.
      #
      # NOTE: each patch step must stay under GitHub Actions' 21000-char expression
      # limit. The monolithic python3 block is split into logical groups below.
      - name: "Patch V8: base + uv (stack_trace, small_vector, trap_handler, uv.gyp, fs.c)"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib
          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path}")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          patch('deps/v8/src/base/debug/stack_trace_posix.cc',
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"',
                '#if defined(__ANDROID__)\n'
                'extern "C" int backtrace(void**, int) { return 0; }\n'
                'extern "C" char** backtrace_symbols(void* const*, int) { return nullptr; }\n'
                'extern "C" void backtrace_symbols_fd(void* const*, int, int) {}\n'
                '#endif\n\n'
                '#include "src/base/build_config.h"\n#include "src/base/free_deleter.h"')

          th = pathlib.Path('deps/v8/src/trap-handler/trap-handler.h')
          c = th.read_text()
          ms = '// X64 on Linux, Windows, MacOS, FreeBSD.'
          me = '#define V8_TRAP_HANDLER_SUPPORTED false\n#endif'
          if ms in c and me in c:
              i0 = c.index(ms); i1 = c.index(me, i0) + len(me)
              c = c[:i0] + '#define V8_TRAP_HANDLER_SUPPORTED false' + c[i1:]
              th.write_text(c); print("patched trap-handler.h")
          else:
              print("::warning::trap-handler block boundaries not found")

          patch('deps/uv/uv.gyp',
                '\n'.join(["      'target_name': 'libuv',","      'toolsets': ['host', 'target'],","      'type': '<(uv_library)',","      'include_dirs': [","        'include',","        'src/',","      ],"]),
                '\n'.join(["      'target_name': 'libuv',","      'toolsets': ['host', 'target'],","      'type': '<(uv_library)',","      'include_dirs+': [","        'include',","        'src/',","      ],"]))
          patch('deps/uv/uv.gyp', "        'include_dirs': [ 'include' ]", "        'include_dirs+': [ 'include' ],")

          patch('deps/uv/src/unix/fs.c',
                '#ifdef FICLONE\n'
                '  if (req->flags & UV_FS_COPYFILE_FICLONE ||\n'
                '      req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {',
                '#ifndef __ANDROID__\n'
                '#ifdef FICLONE\n'
                '  if (req->flags & UV_FS_COPYFILE_FICLONE ||\n'
                '      req->flags & UV_FS_COPYFILE_FICLONE_FORCE) {')

          patch('test/cctest/test_crypto_clienthello.cc',
                "    alloc_base = static_cast<uint8_t*>(aligned_alloc(page, 2 * page));",
                "    CHECK_EQ(posix_memalign(reinterpret_cast<void**>(&alloc_base), page, 2 * page), 0);")

          fc = pathlib.Path('deps/uv/src/unix/fs.c')
          s = fc.read_text()
          oc = '\n'.join(['    goto out;','  }','#endif','','  bytes_to_send = src_statsbuf.st_size;'])
          nc = '\n'.join(['    goto out;','  }','#endif','#endif','','  bytes_to_send = src_statsbuf.st_size;'])
          if oc not in s:
              print("::warning::FICLONE #endif close not found")
          else:
              fc.write_text(s.replace(oc, nc, 1)); print("closed #ifndef __ANDROID__ in fs.c")
          PYEOF

      - name: "Patch V8: atomic_ref polyfill + memcopy + wasm-shuffle"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib
          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path}")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          v8config_h = pathlib.Path('deps/v8/include/v8config.h')
          s = v8config_h.read_text()
          old_atomic_line = '#include <memory>'
          new_polyfill_block = (
              '#include <memory>\n'
              '#if defined(__ANDROID__) && !defined(__cpp_lib_atomic_ref)\n'
              '#ifndef V8_STD_ATOMIC_REF_POLYFILL\n'
              '#define V8_STD_ATOMIC_REF_POLYFILL\n'
              'namespace std {\n'
              'template <typename T>\n'
              'struct atomic_ref {\n'
              '  explicit atomic_ref(T& obj) : ptr_(&obj) {}\n'
              '  void store(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    __atomic_store_n(ptr_, val, static_cast<int>(order)); }\n'
              '  T load(memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_load_n(ptr_, static_cast<int>(order)); }\n'
              '  T exchange(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_exchange_n(ptr_, val, static_cast<int>(order)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order success, memory_order failure) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(success), static_cast<int>(failure)); }\n'
              '  bool compare_exchange_strong(T& expected, T desired,\n'
              '      memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_compare_exchange_n(ptr_, &expected, desired,\n'
              '                                       false, static_cast<int>(order), static_cast<int>(order)); }\n'
              '  T fetch_add(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_add(ptr_, val, static_cast<int>(order)); }\n'
              '  T fetch_or(T val, memory_order order = memory_order_seq_cst) const {\n'
              '    return __atomic_fetch_or(ptr_, val, static_cast<int>(order)); }\n'
              'private:\n'
              '  T* ptr_;\n'
              '};\n'
              '}  // namespace std\n'
              '#endif\n'
              '#endif')
          if old_atomic_line in s:
              s = s.replace(old_atomic_line, new_polyfill_block, 1)
              v8config_h.write_text(s)
              print("patched v8config.h (std::atomic_ref polyfill)")
          else:
              print("::warning::could not find '#include <memory>' in v8config.h")

          patch('deps/v8/src/base/memcopy.h',
                '    std::atomic_ref<T>(destination[i]).store(value, std::memory_order_relaxed);',
                '    __atomic_store_n(&destination[i], value, __ATOMIC_RELAXED);')

          patch('deps/v8/src/compiler/turboshaft/wasm-shuffle-reducer.cc',
                '    wasm::SimdShuffle::ShuffleArray shuffle_bytes;',
                '    wasm::SimdShuffle::ShuffleArray<kSimd128Size> shuffle_bytes;')
          PYEOF

      # REMOVED (2026-07-22): consteval→constexpr patch for regexp-bytecodes-inl.h.
      # NDK r29 ships Clang based on LLVM post-18 (clang-r563880c), which includes
      # the complete fix for llvm-project#94935. This patch is no longer required.

      - name: "Patch V8: zlib cpu_features (getauxval replacement)"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib
          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path}")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          zlib_c = pathlib.Path('deps/zlib/cpu_features.c')
          s = zlib_c.read_text()
          old_incl = (
              '#if defined(ARMV8_OS_ANDROID)\n'
              '#include <cpu-features.h>\n'
              '#elif defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          new_incl = (
              '#if defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)\n'
              '#include <asm/hwcap.h>\n'
              '#include <sys/auxv.h>')
          if old_incl in s:
              s = s.replace(old_incl, new_incl, 1); print("patched cpu_features.c (includes)")
          else:
              print("::warning::include block not found")

          old_aarch64 = (
              '#if defined(ARMV8_OS_ANDROID) && defined(__aarch64__)\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM64_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM64_FEATURE_PMULL);')
          new_aarch64 = (
              '#if (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && defined(__aarch64__)\n'
              '    unsigned long features = getauxval(AT_HWCAP);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP_PMULL);')
          if old_aarch64 in s:
              s = s.replace(old_aarch64, new_aarch64, 1); print("patched cpu_features.c (aarch64)")
          else:
              print("::warning::aarch64 branch not found")

          old_aarch32 = (
              '#elif defined(ARMV8_OS_ANDROID) /* aarch32 */\n'
              '    uint64_t features = android_getCpuFeatures();\n'
              '    arm_cpu_enable_crc32 = !!(features & ANDROID_CPU_ARM_FEATURE_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & ANDROID_CPU_ARM_FEATURE_PMULL);')
          new_aarch32 = (
              '#elif (defined(ARMV8_OS_ANDROID) || defined(ARMV8_OS_LINUX)) && (defined(__ARM_NEON) || defined(__ARM_NEON__))\n'
              '    unsigned long features = getauxval(AT_HWCAP2);\n'
              '    arm_cpu_enable_crc32 = !!(features & HWCAP2_CRC32);\n'
              '    arm_cpu_enable_pmull = !!(features & HWCAP2_PMULL);')
          if old_aarch32 in s:
              s = s.replace(old_aarch32, new_aarch32, 1); print("patched cpu_features.c (aarch32)")
          else:
              print("::warning::aarch32 branch not found")
          zlib_c.write_text(s)
          PYEOF

      - name: "Patch V8: gyp toolchain + cross-compile config"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib
          def patch(path, old, new):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::file not found {path} (skipping)")
                  return
              s = p.read_text()
              if old not in s:
                  print(f"::warning::context not found in {path}")
                  return
              p.write_text(s.replace(old, new, 1))
              print(f"patched {path}")

          patch('tools/v8_gypfiles/v8.gyp',
                "        ['(OS==\"linux\" and clang==1) or (v8_current_cpu in [\"mips64\", \"mips64el\", \"arm\", \"riscv64\", \"loong64\"])', {",
                "        ['((OS==\"linux\" or OS==\"android\") and clang==1) or (v8_current_cpu in [\"mips64\", \"mips64el\", \"arm\", \"riscv64\", \"loong64\"])', {")
          patch('tools/v8_gypfiles/v8.gyp',
                "'<(V8_ROOT)/src/base/platform/platform-posix-time.h',",
                "'<(V8_ROOT)/src/base/platform/platform-posix-time.h',\n"
                "            '<(V8_ROOT)/src/base/platform/platform-linux.h',")
          patch('node.gyp',
                "      ['OS==\"linux\" and clang==1', {",
                "      ['(OS==\"linux\" or OS==\"android\") and clang==1', {")
          # v8_android_log_stdout enables stdout logging on Android (normally suppressed).
          patch('tools/v8_gypfiles/toolchain.gypi',
                "    'v8_android_log_stdout%': 0,", "    'v8_android_log_stdout%': 1,")
          # REMOVED (2026-07-22): branch-protection removal patch. NDK r29 fully supports
          # -mbranch-protection=standard. The previous patch was only needed for r27d.
          patch('common.gypi',
                "          ['OS == \"android\"', {\n"
                "            'cflags': [ '-fPIC', '-I<(android_ndk_path)/sources/android/cpufeatures' ],\n"
                "            'ldflags': [ '-fPIC' ]\n"
                "          }],", "")
          patch('tools/gyp/pylib/gyp/generator/ninja.py',
                "    \"SHARED_INTERMEDIATE_DIR\": \"$!PRODUCT_DIR/gen\",",
                "    \"SHARED_INTERMEDIATE_DIR\": \"$!PRODUCT_DIR/$|OBJ/gen\",")
          ninja_py = pathlib.Path('tools/gyp/pylib/gyp/generator/ninja.py')
          s = ninja_py.read_text()
          obj_var_block = ("        path = path.replace(CONFIGURATION_NAME, self.config_name)\n"
                           "\n        return path")
          obj_var_new = ("        path = path.replace(CONFIGURATION_NAME, self.config_name)\n"
                         "\n        obj = \"obj\"\n"
                         "        if self.toolset != \"target\":\n"
                         "            obj += \".\" + self.toolset\n"
                         "        path = path.replace(\"$|OBJ\", obj)\n"
                         "\n        return path")
          if obj_var_block in s:
              s = s.replace(obj_var_block, obj_var_new, 1)
              ninja_py.write_text(s); print("patched ninja.py (OBJ variable)")
          else:
              print("::warning::ExpandSpecial return not found in ninja.py")
          patch('deps/uvwasi/src/uvwasi.c',
                '#if !defined(_WIN32) && !defined(__ANDROID__)',
                '#if !defined(_WIN32)')
          patch('deps/v8/include/v8config.h',
                '#if (V8_TARGET_ARCH_ARM && !(V8_HOST_ARCH_IA32 || V8_HOST_ARCH_ARM))\n'
                '#error Target architecture arm is only supported on arm and ia32 host',
                '#if (V8_TARGET_ARCH_ARM && !(V8_HOST_ARCH_IA32 || V8_HOST_ARCH_ARM || V8_HOST_ARCH_X64))\n'
                '#error Target architecture arm is only supported on arm, ia32, and x64 host')
          patch('deps/v8/src/common/globals.h',
                'static_assert((kTaggedSize == 8) == TAGGED_SIZE_8_BYTES);',
                '// static_assert((kTaggedSize == 8) == TAGGED_SIZE_8_BYTES);')
          patch('deps/v8/src/builtins/builtins-iterator-inl.h',
                '        } else {                                                            \\\*n'
                '          static_assert(std::numeric_limits<ctype>::max() <=                \\\*n'
                '                        std::numeric_limits<int>::max());                   \\\*n'
                '          static_assert(std::numeric_limits<ctype>::min() >=                \\\*n'
                '                        std::numeric_limits<int>::min());                   \\\*n'
                '          if (!int_visitor(static_cast<int>(val))) {                        \\\*n'
                '            return MaybeDirectHandle<Object>();                             \\\*n'
                '          }                                                                 \\\*n'
                '        }',
                '        } else if constexpr (std::numeric_limits<ctype>::max() <=           \\\*n'
                '                             std::numeric_limits<int>::max() &&             \\\*n'
                '                             std::numeric_limits<ctype>::min() >=           \\\*n'
                '                             std::numeric_limits<int>::min()) {             \\\*n'
                '          if (!int_visitor(static_cast<int>(val))) {                        \\\*n'
                '            return MaybeDirectHandle<Object>();                             \\\*n'
                '          }                                                                 \\\*n'
                '        }')
          PYEOF

      - name: "Patch V8: turboshaft SMI assertions"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib
          import re

          assembler_h = pathlib.Path('deps/v8/src/compiler/turboshaft/assembler.h')
          if assembler_h.exists():
              s = assembler_h.read_text()

              # CRTP two-phase lookup fix for Clang C++20:
              # AssemblerOpInterface<Next> : public Next uses non-dependent member
              # names from the class body. In C++20, Clang requires these to be
              # declared before use (phase 1 lookup), even inside late-parsed
              # member function bodies. We use this-> qualification to make them
              # dependent (deferred to phase 2).
              #
              # 1. matcher_ declaration at line ~5636 is AFTER the constructor
              # at line ~1549. GCC requires data members referenced in member
              # initializer lists to be declared BEFORE the constructor (phase 1
              # lookup). Clang defers lookup. So we move matcher_ before the
              # constructor and keep the initializer list as-is.
              s = s.replace(
                  '  TURBOSHAFT_REDUCER_BOILERPLATE(AssemblerOpInterface)\n\n  template <typename... Args>',
                  '  TURBOSHAFT_REDUCER_BOILERPLATE(AssemblerOpInterface)\n\n  OperationMatcher matcher_;\n\n  template <typename... Args>')
              s = s.replace('  OperationMatcher matcher_;\n};', '};')

              # 2. matcher_ in body getter (this-> is still needed for CRTP)
              s = s.replace('{ return matcher_; }', '{ return this->matcher_; }')

              # 3. ReduceIfReachable calls — qualify call sites ONLY.
              # Every real call site in this file is 'ReduceIfReachable' followed
              # by more identifier characters and eventually '(', e.g.
              # 'ReduceIfReachableComparison('. Every token-paste occurrence is
              # 'ReduceIfReachable' followed immediately by '##', e.g.
              # 'ReduceIfReachable##operation'. The negative lookahead below
              # excludes exactly the token-paste shape and nothing else.
              s = re.sub(r'\bReduceIfReachable(?!##)', r'this->ReduceIfReachable', s)

              # 3b. Macro bodies use token-paste: ReduceIfReachable##operation.
              # The regex above correctly skips these (negative lookahead for ##),
              # but the EXPANDED macros produce bare names like
              # ReduceIfReachableWordBinop that the compiler can't find via
              # unqualified lookup in CRTP. Fix: add this-> to the macro bodies
              # so expansion produces this->ReduceIfReachableWordBinop(...).
              # Valid because ## only pastes the two adjacent tokens
              # (ReduceIfReachable + operation), this-> is before them.
              s = s.replace('return ReduceIfReachable##', 'return this->ReduceIfReachable##')

              # 4. resolve() calls — only in call contexts, never in function defs
              s = s.replace('(resolve(', '(this->resolve(')
              s = s.replace(', resolve(', ', this->resolve(')
              s = s.replace('return resolve(', 'return this->resolve(')
              s = s.replace('= resolve(', '= this->resolve(')
              # 5. Comparison() — single unqualified call in Equal()
              s = s.replace('return Comparison(', 'return this->Comparison(')
              # 6. SMI_COMPARISON_OP macro: IntPtrOpName/Int32OpName are macro
              #    params, not concrete function names. Patch the macro def text.
              s = s.replace(
                  '      return IntPtrOpName(l, r);                                           \\\',
                  '      return this->IntPtrOpName(l, r);                                     \\\')
              s = s.replace(
                  '      return Int32OpName(TruncateWordPtrToWord32(l),                       \\\',
                  '      return this->Int32OpName(TruncateWordPtrToWord32(l),                 \\\')

              print(f"patched {assembler_h} (CRTP dependent names)")

              # Comment out the problematic static assertions in SMI_COMPARISON_OP macro.
              # Use /* */ block comment (NOT // line comment): phase 2 line splicing runs
              # before phase 3 comment recognition. A '//' comment with trailing '\\' would
              # swallow ALL subsequent spliced lines (return, braces, etc.) via the chain
              # of backslash continuations. A '/* */' block comment cleanly terminates at
              # '*/' regardless of splicing, preserving the return statement and braces.
              old_macro = (
                  '      static_assert(kTaggedSize == kInt32Size);                            \\\n'
                  '      static_assert(v8::internal::SmiValuesAre31Bits());                   \\\')
              new_macro = (
                  '      /* static_assert(kTaggedSize == kInt32Size);                            \\\n'
                  '      static_assert(v8::internal::SmiValuesAre31Bits());                   */ \\\')

              if old_macro in s:
                  s = s.replace(old_macro, new_macro, 1)
                  print("patched assembler.h (SMI_COMPARISON_OP assertions)")
              else:
                  print("::warning::SMI_COMPARISON_OP assertions not found in assembler.h")

              assembler_h.write_text(s)

              # ----- Post-patch syntax sanity checks -----
              errors = []
              if 'V<Rep> this->resolve(' in s:
                  errors.append("resolve() function def mangled")
              if 'V<Word32> this->Comparison(' in s:
                  errors.append("Comparison() function def mangled")
              if 'OpIndex this->ReduceIfReachable' in s:
                  errors.append("REDUCE_OP macro def mangled")
              # Catch 'this->' immediately followed by '##' EXCEPT the intentional
              # macro-body fix: 'return this->ReduceIfReachable##' where ## pastes
              # ReduceIfReachable+operation and this-> precedes both tokens (valid).
              broken_pastes = [p for p in re.findall(r'this->\w*##', s)
                               if 'ReduceIfReachable##' not in p]
              if broken_pastes:
                  errors.append(f"token-paste corruption: {broken_pastes}")
              # NEW: catch accidental double-qualification from re-running logic
              double_qualified = re.findall(r'this->this->\w+', s)
              if double_qualified:
                  errors.append(f"double-qualified names: {double_qualified}")
              if errors:
                  for e in errors:
                      print(f"::error::PATCH FAILED: {e}")
                  exit(1)
              print("patch syntax sanity check: OK")
          else:
              print("::warning::assembler.h not found")
          PYEOF

      # REMOVED (2026-07-22): wrappers-inl.h decltype patch.
      # NDK r29's Clang (based on LLVM post-18) correctly resolves
      # decltype(non-static-member) via fully-qualified nested-namespace class
      # names. This patch is no longer required.

      - name: "Patch V8: simdutf atomic_* unavailable on Android NDK libc++"
        working-directory: node
        run: |
          python3 - <<'PYEOF'
          import pathlib

          bta = pathlib.Path('deps/v8/src/builtins/builtins-typed-array.cc')
          if bta.exists():
              s = bta.read_text()

              old_decode = (
                  "  simdutf::result simd_result;\n"
                  "  if (typed_array->buffer()->is_shared()) {\n"
                  "    simd_result = simdutf::atomic_base64_to_binary_safe(\n"
                  "        reinterpret_cast<const T>(input_vector), input_length,\n"
                  "        reinterpret_cast<char*>(typed_array->DataPtr()), output_length,\n"
                  "        alphabet, last_chunk_handling, /*decode_up_to_bad_char*/ true);\n"
                  "  } else {\n"
                  "    simd_result = simdutf::base64_to_binary_safe(\n"
                  "        reinterpret_cast<const T>(input_vector), input_length,\n"
                  "        reinterpret_cast<char*>(typed_array->DataPtr()), output_length,\n"
                  "        alphabet, last_chunk_handling, /*decode_up_to_bad_char*/ true);\n"
                  "  }\n"
              )
              new_decode = (
                  "  simdutf::result simd_result;\n"
                  "#if defined(__ANDROID__)\n"
                  "  // simdutf::atomic_base64_to_binary_safe requires SIMDUTF_ATOMIC_REF,\n"
                  "  // which requires __cpp_lib_atomic_ref (std::atomic_ref, C++20).\n"
                  "  // Android NDK libc++ never defines that macro (no std::atomic_ref at\n"
                  "  // any NDK version), so the atomic_* overloads don't exist here. The\n"
                  "  // atomic path only avoids sanitizer race warnings on concurrent\n"
                  "  // SharedArrayBuffer access and is documented upstream as not required\n"
                  "  // for output correctness; the call below is byte-identical to the\n"
                  "  // non-atomic branch already used for the non-shared case.\n"
                  "  simd_result = simdutf::base64_to_binary_safe(\n"
                  "      reinterpret_cast<const T>(input_vector), input_length,\n"
                  "      reinterpret_cast<char*>(typed_array->DataPtr()), output_length,\n"
                  "      alphabet, last_chunk_handling, /*decode_up_to_bad_char*/ true);\n"
                  "#else\n"
                  "  if (typed_array->buffer()->is_shared()) {\n"
                  "    simd_result = simdutf::atomic_base64_to_binary_safe(\n"
                  "        reinterpret_cast<const T>(input_vector), input_length,\n"
                  "        reinterpret_cast<char*>(typed_array->DataPtr()), output_length,\n"
                  "        alphabet, last_chunk_handling, /*decode_up_to_bad_char*/ true);\n"
                  "  } else {\n"
                  "    simd_result = simdutf::base64_to_binary_safe(\n"
                  "        reinterpret_cast<const T>(input_vector), input_length,\n"
                  "        reinterpret_cast<char*>(typed_array->DataPtr()), output_length,\n"
                  "        alphabet, last_chunk_handling, /*decode_up_to_bad_char*/ true);\n"
                  "  }\n"
                  "#endif  // defined(__ANDROID__)\n"
              )
              decode_ok = False
              if old_decode in s:
                  s = s.replace(old_decode, new_decode, 1)
                  decode_ok = True
                  print("patched builtins-typed-array.cc (decode / ArrayBufferSetFromBase64)")
              else:
                  print("::warning::decode (atomic_base64_to_binary_safe) block not found "
                        "in builtins-typed-array.cc — upstream may have reformatted this "
                        "site; re-check manually if the arm64-v8a/armeabi-v7a build still "
                        "fails on this file")

              old_encode = (
                  "    size_t simd_result_size;\n"
                  "    if (uint8array->buffer()->is_shared()) {\n"
                  "      simd_result_size = simdutf::atomic_binary_to_base64(\n"
                  "          reinterpret_cast<const char*>(uint8array->DataPtr()), length,\n"
                  "          reinterpret_cast<char*>(output->GetChars(no_gc)), alphabet);\n"
                  "    } else {\n"
                  "      simd_result_size = simdutf::binary_to_base64(\n"
                  "          reinterpret_cast<const char*>(uint8array->DataPtr()), length,\n"
                  "          reinterpret_cast<char*>(output->GetChars(no_gc)), alphabet);\n"
                  "    }\n"
              )
              new_encode = (
                  "    size_t simd_result_size;\n"
                  "#if defined(__ANDROID__)\n"
                  "    // Same simdutf::atomic_* unavailability as the decode site above\n"
                  "    // (Android NDK libc++ never defines __cpp_lib_atomic_ref); always\n"
                  "    // use the non-atomic call, byte-identical to the is_shared()==false\n"
                  "    // branch already used here.\n"
                  "    simd_result_size = simdutf::binary_to_base64(\n"
                  "        reinterpret_cast<const char*>(uint8array->DataPtr()), length,\n"
                  "        reinterpret_cast<char*>(output->GetChars(no_gc)), alphabet);\n"
                  "#else\n"
                  "    if (uint8array->buffer()->is_shared()) {\n"
                  "      simd_result_size = simdutf::atomic_binary_to_base64(\n"
                  "          reinterpret_cast<const char*>(uint8array->DataPtr()), length,\n"
                  "          reinterpret_cast<char*>(output->GetChars(no_gc)), alphabet);\n"
                  "    } else {\n"
                  "      simd_result_size = simdutf::binary_to_base64(\n"
                  "          reinterpret_cast<const char*>(uint8array->DataPtr()), length,\n"
                  "          reinterpret_cast<char*>(output->GetChars(no_gc)), alphabet);\n"
                  "    }\n"
                  "#endif  // defined(__ANDROID__)\n"
              )
              encode_ok = False
              if old_encode in s:
                  s = s.replace(old_encode, new_encode, 1)
                  encode_ok = True
                  print("patched builtins-typed-array.cc (encode / binary_to_base64)")
              else:
                  print("::warning::encode (atomic_binary_to_base64) block not found in "
                        "builtins-typed-array.cc — upstream may have reformatted this "
                        "site; re-check manually if the arm64-v8a/armeabi-v7a build still "
                        "fails on this file")

              if decode_ok or encode_ok:
                  bta.write_text(s)

                  # Sanity check: every remaining simdutf::atomic_ call must now sit
                  # inside a non-Android #else branch (or be the comment mentioning it),
                  # so a future upstream reformat that silently reintroduces an
                  # unguarded atomic_ call fails loudly here instead of a 45-minute
                  # cryptic ABI build failure downstream.
                  s2 = bta.read_text()
                  if s2.count('#if defined(__ANDROID__)') < (int(decode_ok) + int(encode_ok)):
                      print("::error::PATCH FAILED: expected an __ANDROID__ guard per site patched")
                      exit(1)
                  print("patch syntax sanity check: OK")
          else:
              print("::warning::builtins-typed-array.cc not found")
          PYEOF

          echo "Skipped from Termux's patch set (not applicable to generic NDK cross-build):"
          echo "  - deps-uv-src-unix-core.c.patch, deps-v8-src-flags-flag-definitions.h.patch:"
          echo "    swap /data/local/tmp for @TERMUX_PREFIX@/tmp placeholder."
          echo "  - deps-uv-src-unix-process.c.patch: strips post-fork privilege-drop calls."

      # ---------- 4. Cross-compile ----------
      - name: Cross-compile Node.js for ${{ matrix.abi }}
        working-directory: node
        run: |
          export TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"

          # Target toolchain (API level via wrapper suffix == -DANDROID_PLATFORM=android-24)
          export CC="ccache $TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang"
          export CXX="ccache $TC/bin/${{ matrix.target }}${{ env.MIN_API }}-clang++"
          # Static-link libc++ -> single-file output where possible, no
          # libc++_shared.so runtime dependency. Whether this actually takes
          # effect depends on gyp's make-generator propagating LDFLAGS.target
          # through both the 'node' and 'lib.target' link steps, which isn't
          # guaranteed across every Node ref/gyp version — the packaging step
          # below checks the real on-disk result with llvm-readelf rather
          # than assuming this flag alone was enough, and bundles
          # libc++_shared.so as a fallback only if it wasn't.
          export CXXFLAGS="$CXXFLAGS -static-libstdc++"
          export LDFLAGS="$LDFLAGS -static-libstdc++"
          export AR="$TC/bin/llvm-ar"
          export NM="$TC/bin/llvm-nm"
          export RANLIB="$TC/bin/llvm-ranlib"
          export STRIP="$TC/bin/llvm-strip"
          export READELF="$TC/bin/llvm-readelf"
          # NOTE: do not export LINK — gyp reads it for the HOST linker and breaks.

          # CRITICAL: host build tools must use the host compiler.
          # Without this, configure probes the ARM clang and thinks host_arch=arm,
          # and host tools (torque/mksnapshot) get built with the Android toolchain.
          #
          # V8's v8config.h requires host_arch to match dest_cpu's requirement:
          #   target arm64 : host must be x64 or arm64
          #   target arm   : host must be ia32 or arm  (x64 is NOT accepted)
          # These macros come from the compiler's predefined macros (__x86_64__,
          # __i386__), which depend on -m64/-m32. configure.py auto-detects
          # host_arch from CC_host's macros and writes it into config.gypi,
          # which then overwrites any host_arch set in GYP_DEFINES.
          # Therefore CC_host MUST carry -m32 for the armeabi-v7a leg.
          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CC_host="ccache gcc -m32"
            export CXX_host="ccache g++ -m32"
          else
            export CC_host="ccache gcc"
            export CXX_host="ccache g++"
          fi

          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            export CFLAGS_host=-m32 CXXFLAGS_host=-m32 LDFLAGS_host=-m32
            HOST_ARCH_GYP="ia32"
          else
            HOST_ARCH_GYP="x64"
          fi

          # android_ndk_path is REQUIRED (node.gyp fails without it)
          export GYP_DEFINES="OS=android host_os=linux target_arch=${{ matrix.dest_cpu }} v8_target_arch=${{ matrix.dest_cpu }} android_target_arch=${{ matrix.dest_cpu }} android_ndk_path=${ANDROID_NDK_HOME} host_arch=$HOST_ARCH_GYP v8_host_arch=$HOST_ARCH_GYP"

          # LAST-RESORT FALLBACK (only if trap-handler.h.patch above does not clear
          # the mksnapshot link error — e.g. the patch went stale for this Node
          # version, per the staleness history in nodejs/node#60369): forcibly drops
          # the trap-handler/simulator-probe symbols from the link graph instead of
          # fixing the source. Costs WASM OOB-trap fast paths in the resulting
          # libnode.so; leave commented unless the patch step above proves insufficient.
          # export GYP_DEFINES="$GYP_DEFINES v8_enable_webassembly=false"

          # 16 KB page alignment for Android 15/16 devices.
          # Since NDK r28 this is the default for arm64/x86_64, but we keep the
          # flag explicit for documentation and backwards compatibility.
          # -rdynamic (alias -Wl,--export-dynamic) exports all Node/V8 symbols
          # from the node binary itself. Without --shared, gyp no longer creates
          # a separate libnode.so and links node statically against the same
          # objects. Those symbols need to remain visible because native addons
          # (node-gyp/node-addon-api) and trap-handler/mksnapshot internals
          # previously depended on the dynamic symbol table of libnode.so.
          export LDFLAGS="$LDFLAGS -Wl,-z,max-page-size=16384 -rdynamic -Wl,--export-dynamic"

          EXTRA_FLAGS=""
          case "${{ inputs.profile || 'balanced' }}" in
            speed) EXTRA_FLAGS="--enable-lto" ;;
            size)  EXTRA_FLAGS="--v8-lite-mode" ;;
          esac

          # --without-corepack was removed in Node.js v26.x
          NODEEXTRA=""
          if ./configure --help 2>&1 | grep -q without-corepack; then
            NODEEXTRA="--without-corepack"
          fi

          ./configure             --cross-compiling             --dest-os=android             --dest-cpu=${{ matrix.dest_cpu }}             --with-intl=none             --without-npm             $NODEEXTRA             --openssl-no-asm             $EXTRA_FLAGS

          # LINK.host/AR.host overrides are belt-and-braces (gyp leaves LINK.host empty
          # in some configurations, silently breaking host-tool linking).
          # Build ONLY the 'node' target: produces both out/Release/node (CLI)
          # and out/Release/lib.target/libnode.so (shared library). Skip cctest
          # and other test/auxiliary targets to save 5-10 minutes of build time.
          # For arm target, host tools MUST be compiled with -m32 so that
          # configure.py detects host_arch=ia32 and v8.gyp selects
          # ia32/push_registers_asm.cc instead of the x64 version.
          if [ "${{ matrix.dest_cpu }}" = "arm" ]; then
            make -j"$(nproc)" node CC.host="ccache gcc -m32" CXX.host="ccache g++ -m32" LINK.host="g++ -m32" AR.host=ar
          else
            make -j"$(nproc)" node CC.host="ccache gcc" CXX.host="ccache g++" LINK.host="g++" AR.host=ar
          fi

          echo "---- ccache stats (${{ matrix.abi }}) ----"
          ccache -s

      # ---------- 5. Rename, strip, package ----------
      # DEFAULT (Option 1): Fully static single binary — zero bundled .so files.
      # OPTION 2 (commented below): Bundle libc++_shared.so + bake $ORIGIN rpath.
      - name: Package node (fully static single binary)
        if: success()
        working-directory: node
        run: |
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          echo "Directory structure under out/Release:"
          find out/Release -maxdepth 3 -type d

          if [ ! -f "out/Release/node" ]; then
            echo "::error::out/Release/node not found — build step may have failed"
            exit 1
          fi

          "$TC/bin/llvm-readelf" -h "out/Release/node" | grep -E 'Class|Machine|Type'

          if [ ! -e node ] || [ "$(readlink -f out/Release/node)" != "$(readlink -f node)" ]; then
            cp out/Release/node node
          else
            echo "out/Release/node and node are already the same file, skipping copy"
          fi

          # --export-dynamic marks symbols via .dynsym, so strip-all is safe.
          "$TC/bin/llvm-strip" --strip-all node

          echo "---- ELF type check ----"
          "$TC/bin/llvm-readelf" -h node | grep -E 'Class|Machine|Type'
          echo "---- Exported dynamic symbol count ----"
          "$TC/bin/llvm-readelf" --dyn-syms node | wc -l

          # ---- HARD CHECK: libc++ must be statically linked ----
          echo "---- NEEDED entries (must NOT contain libc++_shared.so) ----"
          NEEDED="$("$TC/bin/llvm-readelf" -d node | grep NEEDED || true)"
          echo "$NEEDED"

          if echo "$NEEDED" | grep -q 'libc++_shared'; then
            echo "::error::node still links dynamically against libc++_shared.so. The -static-libstdc++ flag did not take effect. Inspect the link command above."
            exit 1
          fi

          # ---- Verify ELF hash table is intact ----
          READELF_OUT="$("$TC/bin/llvm-readelf" -d node 2>&1)"
          if ! echo "$READELF_OUT" | grep -qE '\(GNU_HASH\)|\(HASH\)'; then
            echo "::error::'node' has neither DT_HASH nor DT_GNU_HASH — will fail to load on-device."
            echo "$READELF_OUT"
            exit 1
          fi

          # Package ONLY the single binary. Nothing else.
          tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" node
          ls -lh node "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"

          # ============================================================
          # OPTION 2 — COMMENTED FALLBACK (do NOT delete)
          # ------------------------------------------------------------
          # If a future Node ref breaks -static-libstdc++ propagation through
          # gyp and you need to ship libc++_shared.so again, comment out the
          # 15 lines above (from "cp out/Release/node node" through the tar
          # command) and uncomment the block below instead.
          # ------------------------------------------------------------
          # cp out/Release/node node
          # "$TC/bin/llvm-strip" --strip-all node
          #
          # # Sysroot triple remap for 32-bit ARM
          # case "${{ matrix.dest_cpu }}" in
          #   arm) SYSROOT_TRIPLE="arm-linux-androideabi" ;;
          #   *)   SYSROOT_TRIPLE="${{ matrix.target }}" ;;
          # esac
          # cp "$TC/sysroot/usr/lib/${SYSROOT_TRIPLE}/libc++_shared.so" .
          # patchelf --set-rpath '$ORIGIN' node
          #
          # # Verify patchelf didn't corrupt the dynamic section
          # READELF_OUT="$("$TC/bin/llvm-readelf" -d node 2>&1)"
          # if echo "$READELF_OUT" | grep -qi "goes past the end"; then
          #   echo "::error::patchelf left corrupted DT_STRSZ"
          #   echo "$READELF_OUT"; exit 1
          # fi
          # if ! echo "$READELF_OUT" | grep -qE '\(GNU_HASH\)|\(HASH\)'; then
          #   echo "::error::missing hash table after patchelf"
          #   echo "$READELF_OUT"; exit 1
          # fi
          #
          # if "$TC/bin/llvm-readelf" -d node | grep -q 'NEEDED.*libc++_shared'; then
          #   tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" node libc++_shared.so
          #   ls -lh node libc++_shared.so "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"
          # else
          #   tar czf "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz" node
          #   ls -lh node "../${LIB_NAME}-android-${{ matrix.abi }}.tar.gz"
          # fi
          # ============================================================

      # ---------- 5b. Package Node.js headers (native addon builds) ----------
      # Each ABI gets its own header zip, NOT merged into one.
      # Reason: config.gypi is generated by ./configure per-leg and its
      # contents differ per ABI (target_arch, byteorder, etc). Using arm64-v8a
      # headers to compile native addons against an armeabi-v7a runtime (or
      # vice versa) produces wrong config.gypi and can cause addon build
      # failures or ABI mismatch on device.
      #
      # Layout include/node/*.h follows the official node-vX.Y.Z-headers.tar.gz
      # structure from nodejs.org — this is what node-gyp/node-addon-api reads
      # via `npm config set nodedir=...` when compiling native modules.
      - name: Package Node.js headers (${{ matrix.abi }})
        if: success()
        working-directory: node
        run: |
          HDR_DIR="node-headers/include/node"
          mkdir -p "$HDR_DIR"

          cp common.gypi "$HDR_DIR/"
          cp config.gypi "$HDR_DIR/"
          cp src/*.h "$HDR_DIR/"
          cp -r deps/v8/include/. "$HDR_DIR/"
          cp -r deps/uv/include/. "$HDR_DIR/"

          echo "---- Header contents per ABI (${{ matrix.abi }}) ----"
          find "$HDR_DIR" -maxdepth 1 -name "*.h" | wc -l
          grep -E "target_arch|byteorder" "$HDR_DIR/config.gypi"

          cd node-headers
          zip -rq "../../${LIB_NAME}-android-${{ matrix.abi }}-headers.zip" include
          cd ..
          ls -lh "../${LIB_NAME}-android-${{ matrix.abi }}-headers.zip"

      # ---------- 6a. Upload artifact ----------
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}
          path: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}.tar.gz
          retention-days: 14

      # ---------- 6b. Upload headers artifact ----------
      # Artifact name gets a -headers suffix so it differs from the binary
      # artifact above. The release job below downloads both via separate
      # patterns.
      - name: Upload headers artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}-headers
          path: ${{ env.LIB_NAME }}-android-${{ matrix.abi }}-headers.zip
          retention-days: 14


  # ---------- Release ----------
  # Single job, runs once after all matrix legs finish (armeabi-v7a's
  # continue-on-error keeps this from being blocked by that experimental
  # leg failing — see `build.strategy.matrix` above). Downloads whatever
  # per-ABI artifacts got uploaded and attaches all of them to one release,
  # auto-naming/auto-tagging when the run wasn't itself a tag push so every
  # workflow_dispatch/branch-push build still gets a release without manual
  # tagging, and using GitHub's own commit-based changelog generation.
  release:
    name: Create GitHub Release
    needs: build
    if: success()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # Re-derive NODE_REF/LIB_NAME here rather than plumbing them out of
      # the matrix `build` job: GITHUB_ENV set inside a job's steps is not
      # visible to other jobs, and matrix job `outputs:` only reliably
      # expose whichever matrix leg's write happens to finish last — for
      # values that are identical across every leg (as these are; they come
      # from workflow_dispatch inputs shared by the whole matrix, not from
      # anything ABI-specific), redoing this ~10-line normalization here is
      # simpler and unambiguous than relying on that ordering behavior.
      - name: Resolve inputs
        env:
          NODE_VERSION_CHOICE: ${{ inputs.node_version || 'v26.x' }}
          CUSTOM_REF_RAW: ${{ inputs.custom_ref }}
          LIB_NAME_RAW: ${{ inputs.lib_name || 'node' }}
        run: |
          REQ="$NODE_VERSION_CHOICE"
          if [ "$REQ" = "custom" ]; then REQ="$CUSTOM_REF_RAW"; fi
          test -n "$REQ" || REQ="v26.x"
          echo "NODE_REF=$REQ" >> "$GITHUB_ENV"

          NAME="$LIB_NAME_RAW"
          NAME="${NAME#lib}"; NAME="${NAME%.so}"
          echo "LIB_NAME=$NAME" >> "$GITHUB_ENV"

          # Tag: reuse the pushed tag verbatim when this run WAS a tag push
          # (respects a manually-chosen version tag like v26.0.1-android);
          # otherwise synthesize one from build metadata + run_number so
          # workflow_dispatch/branch-push runs are still unique and
          # traceable back to the run that produced them, with no manual
          # tagging step required.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            SAFE_REF="$(echo "$REQ" | tr -c 'A-Za-z0-9_.-' '-')"
            echo "RELEASE_TAG=${NAME}-android-${SAFE_REF}-run${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Download all ABI artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ env.LIB_NAME }}-android-*
          path: dist
          merge-multiple: true
          if-no-artifact-found: warn  # armeabi-v7a is experimental — its artifact may legitimately be absent

      - name: List downloaded artifacts
        run: ls -lh dist || echo "::warning::no artifacts downloaded — did every matrix leg fail?"

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.LIB_NAME }} — Node ${{ env.NODE_REF }} for Android (build #${{ github.run_number }})"
          # GitHub's own commit-based auto changelog (compares against the
          # previous release's tag). softprops/action-gh-release prepends
          # the custom `body` below to these generated notes rather than
          # replacing them.
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            **Automated Android build**

            | | |
            |---|---|
            | Node.js ref | `${{ env.NODE_REF }}` |
            | Artifact label | `${{ env.LIB_NAME }}` |
            | Build profile | `${{ inputs.profile || 'balanced' }}` |
            | NDK version | `${{ env.NDK_VERSION }}` |
            | Trigger | `${{ github.event_name }}` |
            | Commit | `${{ github.sha }}` |

            arm64-v8a is always included when the build succeeds; armeabi-v7a
            is experimental and only present below if that leg also succeeded.
            Binary inside each tar.gz is named `node` (single ELF, PIE, all
            symbols exported via -rdynamic/--export-dynamic) — rename it to
            lib*.so yourself downstream if your app needs Android to extract
            it with exec permissions.

            Each ABI also ships a `*-headers.zip` (Node.js includes +
            `config.gypi`) for compiling native N-API addons against that
            specific build. Use the headers matching the target ABI —
            `config.gypi` differs between arm64-v8a and armeabi-v7a.
          files: dist/*
